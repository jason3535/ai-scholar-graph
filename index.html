  clark: { title: "Anthropic 联合创始人", bio: "曾是覆盖 AI 领域的记者，在 Bloomberg 和 The Register 工作，后转入行业。加入 OpenAI 担任政策总监，帮助塑造了该组织的 AI 治理和公共沟通方式。创办了极具影响力的 Import AI 周报，是最广泛阅读的 AI 资讯之一。2021年联合创办 Anthropic，专注 AI 政策、安全研究和负责任部署。" },
  hassabis: { title: "Google DeepMind CEO · 2024 诺贝尔化学奖", bio: "1976年生于伦敦，父亲希腊-塞浦路斯裔，母亲新加坡华裔。4岁起的国际象棋神童，13岁达到大师水平（Elo 2300），曾担任英格兰青少年国际象棋队队长。就读于 Barnet 的 Queen Elizabeth's School。17岁加入 Bullfrog Productions，与 Peter Molyneux 联合设计了经典游戏《主题公园》（1994）。在 Lionhead Studios 担任《黑与白》首席 AI 程序员（2001）。创办自己的游戏工作室 Elixir Studios（1998-2005）。后转向神经科学：在剑桥大学女王学院获计算机科学本科（一等荣誉，1997），在伦敦大学学院获认知神经科学博士（2009，导师 Eleanor Maguire，研究海马体中的记忆与想象）。2010年与 Shane Legg 和 Mustafa Suleyman 联合创办 DeepMind。2014年 Google 以约5亿美元收购 DeepMind。领导了 AlphaGo（2016年击败李世石）、AlphaFold（解决蛋白质折叠，2021年 Science 年度突破）和 Gemini。2024年因 AlphaFold 蛋白质结构预测与 John Jumper 共获诺贝尔化学奖。" },
  silver: { title: "AlphaGo 和 AlphaZero 首席研究员", bio: "剑桥大学基督学院学士（1997）。在阿尔伯塔大学获博士（2009），论文主题为强化学习和基于模拟的计算机围棋搜索——为后来的 AlphaGo 奠定了理论基础。2010年起为 DeepMind 做顾问，2013年全职加入。领导强化学习研究组和 AlphaGo 项目，2016年击败世界冠军李世石（全球超过2亿人在线观看）。创造了 AlphaGo Zero（从零开始学习）和 AlphaZero（通过自我对弈精通国际象棋、将棋和围棋）。获 ACM 计算奖（2019），当选英国皇家学会院士（2021）。2026年1月离开 DeepMind，创办 Ineffable Intelligence。" },
  legg: { title: "DeepMind 联合创始人 · 首席 AGI 科学家", bio: "新西兰裔 AI 研究者。在瑞士 IDSIA 跟随 Marcus Hutter 完成博士学位。在2007年的博士论文中，正式定义并创造了「通用人工智能」（AGI）这一术语，提供了衡量机器智能的数学框架。2010年与 Demis Hassabis 和 Mustafa Suleyman 联合创办 DeepMind。现任 Google DeepMind 首席 AGI 科学家，领导安全和 AGI 研究。" },
  suleyman: { title: "微软 AI CEO · DeepMind 联合创始人", bio: "1984年生于伦敦，父亲是叙利亚裔出租车司机，母亲是英国护士。19岁从牛津辍学。在进入 AI 之前，联合创办了一个电话咨询服务，还在伦敦市长办公室担任政策官员。2010年与 Hassabis 和 Legg 联合创办 DeepMind，领导应用 AI 部门。DeepMind 被 Google 收购后，担任 Google 副总裁。2022年创办 Inflection AI，推出 Pi 聊天机器人。2024年微软以6.5亿美元的交易雇佣 Suleyman 和 Inflection 大部分团队，使他成为微软 AI CEO。2023年出版《即将到来的浪潮》一书，讨论 AI 风险。" },
  dean: { title: "Google DeepMind 首席科学家", bio: "明尼苏达大学学士，华盛顿大学博士（导师 Craig Chambers）。1999年作为最早期工程师之一加入 Google。构建了使 Google 能够扩展的基础系统：MapReduce、BigTable、Spanner，后来还有 TensorFlow。2011年与 Andrew Ng、Greg Corrado 和 Rajat Monga 联合创办 Google Brain——那个著名的项目用 16000 个 CPU 训练了一个网络，学会了从 YouTube 视频中识别猫。历任 Google AI 高级副总裁，现为 Google DeepMind 首席科学家，负责 Gemini 开发。被公认为计算史上最伟大的系统工程师之一。" },
  feifei: { zhName: "李飞飞", title: "ImageNet 创造者 · 斯坦福 HAI 联合主任", bio: "1976年生于北京，在四川成都长大。16岁时随父母移民美国新泽西州 Parsippany。就读 Parsippany 高中期间，周末在家人的干洗店帮忙工作。获普林斯顿大学物理学学士（1999，全额奖学金），加州理工学院电气工程硕士和博士（2005，导师 Pietro Perona 和 Christof Koch）。2007年在普林斯顿任助理教授时启动了 ImageNet 项目，利用 Amazon Mechanical Turk 标注了 1400 万+张图片、覆盖 22000 个类别。她创办的 ImageNet 大规模视觉识别挑战赛在 AlexNet 2012年获胜后成为深度学习革命的催化剂。加入斯坦福任教（2009），获终身教职（2012），正教授（2018）。曾任斯坦福 AI 实验室主任（2013-2018），兼任 Google Cloud AI/ML 首席科学家（2017-2018）。联合创办斯坦福 HAI。2024年创办 World Labs。2025年获伊丽莎白女王工程奖��" },
  ng: { title: "Coursera 和 Google Brain 联合创始人", bio: "1976年生于伦敦，父母为香港移民（父亲是血液学家，母亲是艺术行政人员）。1984年随家人移居新加坡，就读精英学校莱佛士书院。在卡内基梅隆大学获计算机科学、统计学和经济学三重学士（1997），MIT 获 EECS 硕士（1998），UC Berkeley 获计算机科学博士（2002，导师 Michael I. Jordan）。2002年加入斯坦福任教，其 CS229 机器学习课程成为校内最受欢迎的课程（1000+学生）。2011年与 Jeff Dean 联合创办 Google Brain——那个著名实验用 16000 个 CPU 训练出了能从 YouTube 视频中识别猫的网络。2012年与 Daphne Koller 联合创办 Coursera，为 800 万+学生普及教育。担任百度首席科学家（2014-2017），领导 1300 名 AI 研究员。创办 DeepLearning.AI（2017）、Landing AI（2018）和 AI Fund（1.75 亿美元风险基金）。" },
  manning: { title: "斯坦福 NLP 组主任", bio: "澳大利亚裔计算语言学家。在澳大利亚国立大学获学位，后在斯坦福获语言学博士（1994）。加入斯坦福任教，成为 NLP 领域最具影响力的人物之一。合著了经典教科书《统计自然语言处理基础》（1999）和《信息检索导论》（2008）。领导斯坦福 NLP 组，产出了业界广泛使用的工具（Stanford CoreNLP、Stanford Parser）。主导开发了 GloVe 词向量（2014）。与 Fei-Fei Li 共同担任斯坦福 HAI 联合主任。他的教学和研究培养了多代 NLP 研究者。" },
  liang: { title: "HELM 基准创造者 · Together AI 创始人", bio: "斯坦福教授，在大语言模型评估和问责方面成为最重要的声音之一。创建了 HELM（大语言模型整体评估，2022），这是评估大语言模型最全面、最标准化的基准，涵盖准确性、鲁棒性、公平性和毒性等多个维度。领导了斯坦福 Alpaca 项目（2023），证明了用 GPT 生成的数据微调的小模型可以匹敌更大的模型。联合创办 Together AI，致力于开源 AI 基础设施的民主化。" },
  goodfellow: { title: "GAN 发明人", bio: "1987年生，在旧金山湾区长大。斯坦福大学计算机科学学士和硕士（在 Andrew Ng 的组里），蒙特利尔大学机器学习博士（2015，导师 Yoshua Bengio 和 Aaron Courville）。博士期间发明了生成对抗网络（GAN，2014）——据说这个想法是在酒吧聊天时产生的，他回家当晚就编写了第一个版本。与 Bengio 和 Courville 合著了权威教科书《深度学习》（2016）。职业轨迹：Google Brain（博士后）、OpenAI（2016-2017）、Google Research（2017-2019）、Apple 特别项目组 ML 总监（2019-2022，因返回办公室政策辞职）、Google DeepMind（2022至今）。入选 MIT 科技评论 35 岁以下创新者（2017）���" },
  krizhevsky: { title: "AlexNet 创造者", bio: "生于乌克兰，在加拿大长大。多伦多大学 Geoffrey Hinton 门下的博士生。2012年与 Hinton 和 Ilya Sutskever 共同构建了 AlexNet——一个深度卷积神经网络，以压倒性优势赢得 ImageNet 竞赛（错误率 15.3%，第二名 26.2%）。这一结果被普遍认为是引爆现代深度学习时代的时刻，证明了 GPU 训练的深度网络可以大幅超越传统计算机视觉方法。三人联合创办 DNNresearch，2013年被 Google 收购。此后保持相对低调。" },
  abbeel: { title: "机器人学与强化学习先驱", bio: "生于比利时。斯坦福大学博士（2008，导师 Andrew Ng），论文研究学徒学习和逆强化学习。加入 UC Berkeley 任教，成为机器人学习和深度强化学习领域的领军人物。实验室开创了 Sim-to-Real 迁移（在模拟中训练机器人、在真实世界中部署）和域随机化技术。创办 Covariant（仓库机器人 AI），将深度学习带入工业机器人领域。指导了 John Schulman 的博士研究（PPO 的创造者）。通过 Berkeley 实验室培养了大量杰出 AI 研究者。" },
  levine: { title: "机器人学习先驱", bio: "UC Berkeley 教授，开创了从原始像素进行端到端机器人学习。他的工作证明了机器人可以直接从视觉输入学习复杂的操作任务，使用深度强化学习而无需手工设计特征。离线强化学习（从预先收集的数据集学习而非在线交互）的核心贡献者。联合创办 Physical Intelligence (pi)，构建机器人基础模型。他的研究架起了大语言模型的成功与物理世界之间的桥梁。" },
  ho: { title: "扩散模型（DDPM）创造者", bio: "在 UC Berkeley 获博士（导师 Pieter Abbeel 和 Stefano Ermon）。创造了去噪扩散概率模型（DDPM，2020），复兴并极大改进了基于扩散的生成建模方法。DDPM 成为 Stable Diffusion、DALL-E 2、Midjourney、Sora 以及几乎所有现代图像和视频生成系统的基础技术。加入 Google Brain（现 Google DeepMind），继续推进扩散模型及其在视频生成中的应用。" },
  wei: { title: "思维链提示的发现者", bio: "Google Brain 研究者，做出了关于大语言模型的两个最具影响力的发现。第一，思维链提示（2022）：发现仅仅在提示中加入「让我们一步步思考」就能大幅提升 LLM 的推理能力，这一技术现在几乎被所有 AI 应用所采用。第二，涌现能力（2022）：证明某些能力会随着模型规模的增大而突然、不可预测地出现，从根本上改变了该领域对 Scaling 的思考方式。后加入 OpenAI，从事下一代模型的推理能力研究。" },
  anil: { title: "Gemini 技术负责人", bio: "印度裔 AI 研究者，成长为 Google 最重要 AI 项目的技术负责人。领导了 PaLM 2 和 Gemini 模型家族的开发——Google 的旗舰多模态 AI 系统，旨在与 GPT-4 竞争。他的工作涵盖大规模高效训练、多语言能力和多模态推理。" },
  musk: { title: "xAI 创始人 · 特斯拉 & SpaceX CEO", bio: "1971年生于南非。宾大经济学+物理学双学士。创办 Zip2、PayPal、SpaceX、Tesla。2015年联合创办 OpenAI，2018年退出董事会。2023年7月创办 xAI，构建 Grok。到2026年初12位创始人仅剩2位。" },
  jimmyba: { zhName: "巴吉铭", title: "Adam 优化器联合创造者 · xAI 联合创始人", bio: "生于中国，在加拿大长大。多伦多大学博士（导师 Hinton）。Adam 优化器（2014）合著者——AI 领域引用最多的论文（95000+次）。多伦多大学教授。xAI 联合创始人，2026年2月离开。" },
  szegedy: { title: "Inception/GoogLeNet 创造者 · xAI 联合创始人", bio: "匈牙利裔。波恩大学博士。在 Google 创造 Inception 架构（GoogLeNet）并与 Goodfellow 开创对抗样本研究。开发 Batch Normalization。2023年联合创办 xAI，2025年2月离开。" },
  gregyang: { zhName: "杨格", title: "Tensor Programs / muP 创造者 · xAI 联合创始人", bio: "华裔美国数学家。哈佛数学学士。在微软研究院开发 Tensor Programs 理论和 muP——高效训练大模型的必备技术。2023年联合创办 xAI，2026年1月因健康原因退出。" },
  kaiminghe: { zhName: "何恺明", title: "ResNet 创造者 · 21世纪引用最多的论文", bio: "1984年生于广州。执信中学，2003年广东高考总分第一。清华学士，港中文博士。在微软亚研创造 ResNet（2015）——21世纪引用最多的论文。还创造了 Mask R-CNN。2024年加入 MIT 副教授，2025年同时加入 Google DeepMind。" },
  sainingxie: { zhName: "谢赛宁", title: "DiT（扩散Transformer）创造者 · AMI Labs CSO", bio: "华裔视觉研究者。UCSD 博士。创造 ConvNeXt 和 DiT（2023），DiT 成为 OpenAI Sora 的基础架构。2026年加入 LeCun 的 AMI Labs 任首席科学官。" },
  quocle: { title: "Google Fellow · Google Brain 联合创始人", bio: "1982年生于越南。顺化国学高中。澳大利亚国立大学学士，斯坦福博士（导师 Andrew Ng）。Google Brain 创始成员（2011）。与 Sutskever 共同发明 Seq2Seq（2014）。发起 AutoML。现为 Google Fellow。" },
  liangwenfeng: { zhName: "梁文锋", title: "DeepSeek 创始人", bio: "1985年生于广东湛江。浙大学士和硕士。2015年创办幻方量化，资管超千亿。2023年创办 DeepSeek 追求 AGI。R1 模型（2025年1月）以 600 万美元训练成本匹敌 GPT-4，震动全球。" },
  kaifulee: { zhName: "李开复", title: "01.AI 创始人 · 前 Google 中国总裁", bio: "1961年生于台北。哥伦比亚大学学士，CMU 博士（语音识别）。历任 Apple、SGI、微软副总裁。创办微软中国研究院。Google 中国总裁（2005-2009）。创办创新工场。2023年创办 01.AI。著有《AI 超级大国》。" },
  jietang: { zhName: "唐杰", title: "智谱 AI 创始人 · 清华大学教授", bio: "清华大学计算机系教授。创办 AMiner 学术搜索。受智源研究院委托建设中国首个超大规模自然语言模型。创办智谱 AI，打造 GLM 系列，估值超 30 亿美元。" },
  yanjunjie: { zhName: "闫俊杰", title: "MiniMax 创始人兼 CEO", bio: "约1989年生。高中时自学高等微积分。东南大学数学学士（2006），中科院自动化所博士（2015），清华大学博后。在商汤科技工作6年+，任研究院副院长。2019年因 OpenAI 的 Dota 2 AI 击败人类而着迷，从计算机视觉转向 NLP。2021年12月创办 MiniMax，开发海螺 AI（视频生成）和多模态模型套件。2026年1月在港交所 IPO，36岁成为亿万富翁，身家 32 亿美元。" },
  yangzhilin: { zhName: "杨植麟", title: "月之暗面创始人兼 CEO（Kimi）", bio: "1992年生于广东汕头。就读汕头金山中学，无编程背景被选入信息学奥赛训练队，获 NOIP 广东省一等奖，保送清华大学。初入热能工程系，大二转入计算机系，师从唐杰教授。2015年以全班第一毕业。赴卡内基梅隆大学读博，仅用4年完成（标准6年），2019年毕业，导师 Ruslan Salakhutdinov（后任 Apple AI 负责人）和 William Cohen（Google DeepMind）。读博期间在 Meta 和 Google Brain 实习。共同开发了 Transformer-XL 和 XLNet。2023年3月与清华同学周昕宇、吴育昕联合创办月之暗面。创造了 Kimi，中国最受欢迎的 AI 助手之一，以业界领先的长上下文能力著称（起步即 20万+ token）。同时兼任清华助理教授和上海期智研究院 PI。" },
  wuyonghui: { zhName: "吴永辉", title: "字节跳动 AI 研究负责人 · 前 Google Fellow", bio: "南京大学毕业，后在加州大学河滨分校获统计学硕士和计算机科学博士（2008）。2008年加入 Google，前7年做搜索排序，2014-2023年在 Google Brain 从事机器学习、基因组学和 NLP。2023年9月晋升 Google Fellow（相当于副总裁级别）。最知名成就是作为 Google 神经机器翻译系统（GNMT, 2016）第一作者，将 Google 翻译从短语级翻译升级为神经翻译。2025年2月加入字节跳动任 Seed 团队基础研究负责人，直接向 CEO 梁汝波汇报。还创造了 Seedance 2.0 视频生成模型。" },
  zhangzhengyou: { zhName: "张正友", title: "腾讯首席科学家 · 张氏标定法发明人", bio: "1965年生于湖北。华中科技大学学士，法国南锡大学硕士，巴黎第十一大学计算机科学博士（1990）。1998年加入微软研究院任首席研究员。发明了张氏相机标定法（1998）——全球计算机视觉应用的通用标准，从自动驾驶到 AR 无处不在。IEEE Fellow、ACM Fellow。2018年加入腾讯任首席科学家，领导 Robotics X 实验室和犀牛鸟实验室。" },
  yudong: { zhName: "俞栋", title: "前腾讯 AI Lab 副主任 · 语音 AI 先驱", bio: "浙江大学电气工程学士，中科院自动化所模式识别硕士，印第安纳大学计算机硕士，爱达荷大学计算机博士。在微软研究院工作 16 年+，率先将深度学习应用于语音识别。与 Hinton、邓力等合著的 DNN 语音识别论文（2011）开启了语音领域的深度学习革命。2017年加入腾讯 AI Lab 任副主任。发表 200+ 论文，多部语音识别专著。2026年1月底离开腾讯。" },
  yaoshunyu: { zhName: "姚顺雨（绰号：腾讯尧舜禹）", title: "腾讯首席 AI 科学家 · ReAct + 思维树作者", bio: "1998年生，安徽省理科探花。2015年保送清华姚班（Yao Class）。2019年赴普林斯顿读 CS 博士，导师 Karthik Narasimhan（NLP + 强化学习）；2024年6月毕业。在校期间已是 Agent 研究范式奠基人：提出 ReAct（推理-行动融合，2022）、Tree of Thoughts（思维树，2023）、CoALA 模块化认知架构。2024年8月加入 OpenAI 研究团队，主导 Operator（浏览器 Agent）和 Deep Research 产品研发。2025年12月跳槽腾讯任首席 AI 科学家，27 岁直接汇报总裁刘炽平，主导混元大模型与 Agent 技术融合。因姓名「姚顺雨」谐音「尧舜禹」被业内戏称腾讯尧舜禹。学术之外是地下 rapper，有作品在网易云音乐发表。" },
  gregbrockman: { zhName: "Greg Brockman", title: "OpenAI 总裁兼联合创始人 · 第一任 CTO", bio: "1987年生于北达科他州。Harvard 数学退学，转 MIT 后再退学。2010 年加入 Stripe 成为第 4 号员工，2013-2015 年任 CTO。2015 年与 Sam Altman、Elon Musk、Ilya Sutskever 等共同创办 OpenAI 任首任 CTO，后转任总裁兼董事长。2024 年 8-11 月短暂离岗 sabbatical 后回归。2026 年 4-5 月在 Musk 起诉 OpenAI 案中作证披露：个人持股价值近 $300 亿（从未投入资金），仅次于 Sam Altman。被认为是 OpenAI 把研究变成产品的核心工程负责人。" },
  miramurati: { zhName: "Mira Murati", title: "Thinking Machines Lab 创始人兼 CEO · 前 OpenAI CTO", bio: "1988 年生于阿尔巴尼亚 Vlorë。16 岁通过 UWC 项目去加拿大，Dartmouth 机械工程本科。Tesla Model X 工程项目经理（2013-2016），Leap Motion 产品 VP。2018 年加入 OpenAI 任 VP of Applied AI，2022 年升 CTO，主导 ChatGPT/DALL-E/Sora 产品研发。2024 年 9 月离职。2025 年 2 月创办 Thinking Machines Lab，7 月 a16z 领投种子轮 $20 亿，估值 $120 亿。2026 年 4 月新一轮估值 $500-600 亿融资中，Google 多次大额合作。联创团队均为前 OpenAI VP：Barret Zoph、Lilian Weng，加上从 Anthropic 跳过来的 OpenAI 联创 John Schulman。" },
  janleike: { zhName: "Jan Leike", title: "Anthropic Alignment 负责人 · 前 OpenAI Superalignment 共同负责人", bio: "德国哲学家与 ML 研究者。Cambridge 哲学硕士，澳大利亚国立大学（ANU）机器学习博士。DeepMind Alignment 团队 2018-2021。OpenAI 2021-2024 与 Sutskever 共同负责 Superalignment 团队，目标 4 年内解决超级智能对齐。2024 年 5 月在 Sutskever 离职后立刻辞职，公开声明「OpenAI 的安全文化和流程已被光鲜的产品所取代」。2024 年 5 月加入 Anthropic 任 Alignment Lead，带走数名核心成员。在 AI 安全社区是与 Yudkowsky、Stuart Russell 并列的代表人物。" },
  aravindsrinivas: { zhName: "Aravind Srinivas", title: "Perplexity AI 创始人兼 CEO · Berkeley 博士", bio: "印度泰米尔纳德邦人，IIT Madras 电气工程学士。UC Berkeley CS 博士在 Pieter Abbeel 名下（2021），研究表征学习+强化学习。OpenAI/DeepMind/Google 实习。2022 年 8 月与 Andy Konwinski、Denis Yarats、Johnny Ho 联创 Perplexity AI——对标 Google Search 的 AI 答题搜索。Nvidia、Jeff Bezos、Yann LeCun 早期投资。2025 年估值约 $90 亿，日活用户超 5000 万。Comet 浏览器、Perplexity Finance、Pro 订阅都是后续产品扩张。被视为 AI Search 这条赛道的代表创始人。" },
  wangxiaochuan: { zhName: "王小川", title: "百川智能创始人兼 CEO · 前搜狗 CEO", bio: "1978 年生于成都。1996 年 NOI 全国信息学奥赛金牌保送清华计算机系。2003 年清华硕士毕业加入搜狐。2010 年主导搜狗输入法和搜狗搜索独立分拆，2013 年任搜狗 CEO，2017 年带搜狗赴美 IPO（NYSE: SOGO）。2021 年搜狗被腾讯私有化。2023 年 4 月创办百川智能，首轮 CMC、腾讯、小米、3 家美元基金参投。5 个月内连续发布 Baichuan-7B/13B/53B/Baichuan2 等系列开源大模型。2024 年转向 toC 医疗 AI 大模型 Baichuan-M3（HealthBench 全球第一）。账上现金 30 亿，2027 年计划 IPO。" },
  liuzhiyuan: { zhName: "刘知远", title: "面壁智能联创 · 清华副教授 · MiniCPM 主导者", bio: "清华 CS 本博（2011 博士，导师孙茂松），专注 NLP、知识图谱、表征学习。AAAI/IJCAI/ACL 等顶会论文 200+。2021 年 6 月「悟道 2.0」万亿参数模型发布后，与导师孙茂松、学生曾国洋等联合创办面壁智能（ModelBest），走端侧 AI 路线。2024 年 2 月发布 MiniCPM 仅 24 亿参数性能赶超百亿模型，被誉「小钢炮」。MiniCPM-V 4.0 4B 参数登 Nature Communications，8B 多模态综合性能超越 GPT-4V 和 Gemini Pro。2024 年斯坦福 AI 团队抄袭面壁开源模型事件让公司国际知名度暴增。是中国端侧大模型代表人物。" },
  bcherny: { zhName: "Boris Cherny", title: "Claude Code 创建者兼负责人", bio: "前 Meta 5 年首席工程师（Principal Engineer），负责 Facebook 和 Instagram 内部开发者工具。《Programming TypeScript》（O'Reilly，2019）作者，是 TypeScript 社区的标准教材之一。加入 Anthropic 后构思了 Claude Code 的最初原型——最早只是一个让 Claude 知道工程师在听什么音乐的 CLI 玩具，后来给它访问文件系统权限，在公司内部「病毒式」扩散。2025 年 Claude Code 从 research preview 转为 GA。被业内视为 AI native 工程师的代表实践者（传闻每周写 100+ PR）。被 Pragmatic Engineer、Lenny 等头部技术媒体频繁深度访谈，影响了大批工程师对 agentic coding 的认知。" },
  jiangdaxin: { zhName: "姜大昕", title: "阶跃星辰创始人兼 CEO · 前微软全球副总裁", bio: "中科大本科，中科院软件所硕士，纽约州立大学布法罗分校 CS 博士（2005）。在新加坡南洋理工大学计算机系任助理教授一年。2007 年加入微软亚洲研究院任首席研究员，开启 16 年微软生涯，横跨机器学习、数据挖掘、NLP 和生物信息学。2008 年获 SIGKDD 最佳应用论文奖。2011 年转入微软亚洲互联网工程院（STCA）。2017 年升任微软全球合伙人 + STCA 副院长 + 首席科学家。2023 年 3 月升任微软副总裁，负责 Bing 全球搜索体验、AI School China 和 NLP 技术研发，管理 400+ 人的精英团队。2023 年 4 月创办阶跃星辰，主攻多模态 + AGI Scaling Law。2025 年入选 IEEE Fellow。Step 系列模型（Step-1/Step-2/Step-3）以多模态生成著称。「AI 六小虎」之一，与上海资本系深度绑定。" },
  catwu: { zhName: "Cat Wu（Catherine Wu）", title: "Claude Code 创始 PM · 现任产品负责人", bio: "Anthropic 招牌产品经理，Claude Code 创始 PM（day 1 加入团队）。背景路径：JP Morgan（投行）→ Scale AI（数据标注独角兽）→ Dagster Labs（数据基础设施）→ Index Ventures（欧洲一线 VC）→ Anthropic（2024）。2025 年曾跳槽 Cursor 但只待了 2 周就回流 Anthropic，被业内戏称「反向猎头」事件——侧面说明 Anthropic 内部产品-工程协作密度远超同行。Lenny's Podcast 高频嘉宾，被认为是 AI 时代产品经理「速度优先 + 技术深度」结合的代表。Code with Claude 开发者大会（SF，2025.5）主讲。" },
  zhoujingren: { zhName: "周靖人", title: "阿里云 CTO · 通义实验室负责人", bio: "哥伦比亚大学计算机科学博士。曾在微软研究院工作。2015年加入阿里巴巴，历任阿里云首席科学家、达摩院副院长。现任阿里云 CTO 兼通义实验室负责人，统管通义千问（Qwen）模型家族——中国最具影响力的开源大模型系列。2026年3月林骏扬离职后直接接管 Qwen 团队。与 CEO 吴泳铭共同领导阿里基础模型特别工作组。" },
  sutton: { title: "强化学习之父", bio: "1956年生于美国。斯坦福心理学学士（1978），马萨诸塞大学计算机科学博士（1984，导师 Andrew Barto，两人共同奠基了强化学习领域）。2003年加入阿尔伯塔大学。与 Barto 合著了《强化学习导论》（1998）——训练了几乎所有在世 RL 研究者的标准教科书。发明了时间差分（TD）学习、策略梯度方法和 Dyna 架构。曾任 DeepMind Alberta 杰出研究科学家。2019年发表的《The Bitter Lesson》成为现代 AI 最常被引用的哲学文章之一。" },
  schmidhuber: { title: "LSTM 联合发明人 · AI 先驱", bio: "1963年生于慕尼黑。慕尼黑工业大学博士（1991）。瑞士 AI 实验室 IDSIA 联合主任。与 Sepp Hochreiter 联合发明了 LSTM（1997）——在 Transformer 之前驱动了 Google 翻译、Siri、Alexa 和大多数序列建模。还开创了元学习、神经网络压缩和好奇心驱动学习。创办 NNAISENSE（2014）。2021年赴沙特 KAUST 领导 AI 计划。以在深度学习归功问题上的直言不讳著称。" },
  hochreiter: { title: "LSTM 联合发明人", bio: "奥地利计算机科学家。慕尼黑工业大学，1991年在 Schmidhuber 指导下完成毕业论文——首次发现了循环神经网络中的梯度消失问题。这直接催生了 LSTM（1997）。林茨约翰·开普勒大学教授，创办了 ELLIS Linz 单元和 JKU 机器学习研究所。" },
  kingma: { title: "VAE 和 Adam 优化器创造者", bio: "荷兰计算机科学家。阿姆斯特丹大学博士（2017，导师 Max Welling，最优等毕业）。创造了现代 AI 两大基础构件：VAE（2013，连接概率建模与深度学习）和 Adam 优化器（2014，与 Jimmy Ba 合著，95000+引用）。OpenAI 创始团队成员（2015）。Google Brain 研究员。2024年10月加入 Anthropic。连续获得 ICLR 时间检验奖（2024 VAE、2025 Adam）。" },
  vinyals: { title: "Google DeepMind 研究副总裁 · Seq2Seq 联合创造者", bio: "生于智利，在西班牙加泰罗尼亚长大。UC Berkeley 博士。加入 Google Brain 和 DeepMind。与 Sutskever 和 Quoc Le 联合发明了 Seq2Seq 模型（2014）——通往现代 LLM 的基础架构之一。领导了 AlphaStar（2019，击败星际争霸 II 顶级玩家）。现任 Google DeepMind 研究副总裁，联合领导 Gemini 开发。" },
  rombach: { title: "Stable Diffusion / Latent Diffusion 创造者", bio: "德国 AI 研究者。海德堡大学物理学→LMU 慕尼黑计算机科学博士。合著了 Latent Diffusion 论文（2022），突破性地在压缩潜空间而非像素空间运行扩散——将计算成本降低 10-100 倍。这成为了 Stable Diffusion，最广泛使用的开源图像生成模型。曾任 Stability AI 研究总监。2024年与原始团队联合创办 Black Forest Labs，推出 FLUX 系列模型。" },
  mensch: { title: "Mistral AI 联合创始人兼 CEO", bio: "1992年生于巴黎。父亲数学家，母亲计算机科学家。Ecole Polytechnique 应用数学和计算机科学硕士，ENS Paris-Saclay 数学视觉学习硕士。机器学习和功能性磁共振成像博士，之后做了2年数学博后。2020年底加入 DeepMind 巴黎，从事大语言模型、多模态和检索增强架构。2023年5月与 Guillaume Lample 和 Timothee Lacroix（均为前 Meta FAIR）联合创办 Mistral AI。一年内达到数十亿美元估值，成为欧洲 AI 冠军。以开源权重模型（Mixtral、Mistral Large）闻名。" },
  robinli: { zhName: "李彦宏", title: "百度创始人兼 CEO · ERNIE", bio: "1968年生于山西阳泉。北京大学信息管理学士，纽约州立大学布法罗分校计算机科学硕士。在美国创造了 RankDex（1996），一个使用超链接分析进行网页排名的早期搜索引擎——早于 Google 的 PageRank。2000年与徐勇联合创办百度。将百度大力转向 AI：自动驾驶平台 Apollo Go（累计超 2000 万次出行）、文心大模型（ERNIE）系列、文心一言（月活 2.02 亿）。入选 TIME 100 AI（2023）。" },
  luqi: { zhName: "陆奇", title: "MiraclePlus 创始人 · 前百度 COO & 微软 EVP", bio: "1961年生。卡内基梅隆大学计算机科学博士。硅谷最成功的华人高管之一。职业轨迹：IBM 研究院→Yahoo 工程副总裁→微软执行副总裁（2013-2016，美国科技界最高级别华人高管之一）。被李彦宏招募任百度 COO（2017-2018），加速百度 AI 转型。被 Sam Altman 亲自招募领导 Y Combinator 中国（2018-2019）。在北京创办 MiraclePlus（前身 YC 中国），已投资 340+ 家公司。硅谷和中国科技生态之间的桥梁人物。" },
  linjunyang: { zhName: "林骏扬", title: "前 Qwen 技术负责人 · 阿里最年轻 P10", bio: "1993年生。北京大学计算机和语言学专业，语言学硕士。2019年加入阿里达摩院任高级算法工程师。主导了阿里 M6（超大规模 MoE 模型）、OFA（ICML 2022）和 Chinese-CLIP。最核心成就是将 Qwen 从一个不知名的副项目打造成全球最有影响力的开源大模型系列。2025年成为阿里最年轻的 P10 级技术负责人。2026年3月因不认同将 Qwen 团队垂直整合结构拆散的组织重组方案而辞职。" },
  pachocki: { title: "OpenAI 首席科学家（接替 Sutskever）", bio: "波兰裔。MIT 理论计算机科学博士。2017年加入 OpenAI 任研究科学家。领导对齐和推理研究。2024年 Ilya Sutskever 离职后晋升为首席科学家。o1 和 o3 推理模型的核心架构师。与 Mark Chen 并称 OpenAI 研究双核。" },
  markchen: { zhName: "陈麻克", title: "OpenAI CRO · DALL-E/Codex/GPT-4V/o1 负责人", bio: "MIT 数学与计算机科学。早期加入 OpenAI。先后主导了 DALL-E、Codex（GitHub Copilot 基础）、GPT-4 视觉能力和 o1 推理模型。2025年3月晋升为首席研究官（CRO）。与 Pachocki 并称「研究双头」。OpenAI 最多产的研究领导者之一。" },
  noambrown: { zhName: "诺姆·布朗", title: "推理研究 · 扑克 AI → o1", bio: "CMU 博士。创造了 Libratus（2017）和 Pluribus（2019）——首个在单挑和多人无限注德州扑克中击败顶级职业选手的 AI 系统。先在 Meta AI Research (FAIR) 工作。2023年被 OpenAI 招募，成为 o1 推理模型的关键贡献者——将博弈论搜索和规划方法应用于 LLM 推理。他的「测试时计算」（让模型思考更久）工作是 OpenAI 推理突破的核心。" },
  jaredkaplan: { zhName: "贾里德·卡普兰", title: "Anthropic 联合创始人 · Scaling Laws 先驱", bio: "理论物理学家转 AI 研究。约翰霍普金斯大学教授。联合发表了里程碑论文《神经语言模型的缩放定律》（2020），揭示了模型规模、数据、算力与性能之间的幂律关系——这一洞察指导了 GPT-3/4 的开发。2021年与 Dario Amodei 等前 OpenAI 研究者共同创办 Anthropic。领导缩放和对齐核心研究。" },
  sammccandlish: { zhName: "萨姆·麦坎德利什", title: "Anthropic 联合创始人 · Constitutional AI", bio: "物理学博士（约翰霍普金斯大学，与 Jared Kaplan 合作）。加入 OpenAI 任研究科学家，研究神经网络缩放行为。联合发表缩放定律关键论文。2021年离开 OpenAI，与 Dario Amodei、Daniela Amodei、Tom Brown、Chris Olah、Jack Clark 和 Jared Kaplan 共同创办 Anthropic。Constitutional AI 和 Claude 模型开发的核心贡献者。" },
  pushmeetkohli: { zhName: "普什米特·科利", title: "Google DeepMind 研究副总裁 · AlphaFold/AlphaEvolve", bio: "IIT 孟买本科，牛津大学博士。先在微软剑桥研究院任首席研究员。2017年加入 DeepMind，升任研究副总裁。领导了 AlphaFold（蛋白质结构预测，革命性地改变了生物学）、AlphaEvolve（数学优化）、SynthID（AI 水印）和 AI 联合科学家等项目。入选 TIME 100 AI（2023）。DeepMind 最具影响力的研究领导者之一，架起 AI 与科学之间的桥梁。" },
  dayaguo: { zhName: "郭大亚", title: "DeepSeek-R1 第一作者", bio: "香港中文大学（深圳）博士。DeepSeek 核心研究员。DeepSeek-R1（2025）第一作者——这一突破性推理模型证明了强化学习可以在无需监督微调的情况下教会 LLM 推理，以极低成本达到与 OpenAI o1 竞争的性能。同时是 DeepSeek-Coder 和 DeepSeek-V2/V3 的关键贡献者。" },
};

function applyLanguage(lang) {
  currentLang = lang;
  const t = i18n[lang];

  // Nav
  document.querySelector(".nav-title").textContent = t.navTitle;
  document.getElementById("search-input").placeholder = t.searchPlaceholder;
  document.getElementById("nav-stats").textContent = t.stats(scholars.length, connections.length);

  // Filter pills
  const pillMap = { all: t.filterAll, "deep-learning": t.filterDL, nlp: t.filterNLP, rl: t.filterRL, vision: t.filterVision, safety: t.filterSafety };
  document.querySelectorAll(".filter-pill").forEach(btn => {
    btn.textContent = pillMap[btn.dataset.filter] || btn.textContent;
  });

  // Legend
  const legendLabels = document.querySelectorAll("#legend .legend-label");
  const legendTexts = [t.legendDeepMind, t.legendOpenAI, t.legendAnthropic, t.legendMeta, t.legendStanford, t.legendUniversity, t.legendStartup, t.legendCoauthor, t.legendAdvisor, t.legendCofounder, t.legendColleague];
  legendLabels.forEach((el, i) => { if (legendTexts[i]) el.textContent = legendTexts[i]; });

  const legendHeadings = document.querySelectorAll("#legend .legend-heading");
  if (legendHeadings[0]) legendHeadings[0].textContent = t.legendOrgs;
  if (legendHeadings[1]) legendHeadings[1].textContent = t.legendConns;

  // Detail panel section titles
  const sectionTitles = document.querySelectorAll(".detail-section-title");
  if (sectionTitles[0]) sectionTitles[0].textContent = t.sectionAbout;
  if (sectionTitles[1]) sectionTitles[1].textContent = t.sectionPapers;
  if (sectionTitles[2]) sectionTitles[2].textContent = t.sectionConnections;

  // Keyboard hints
  const hints = document.querySelectorAll(".hint-item");
  const hintTexts = [t.hintZoom, t.hintPan, t.hintDetails, t.hintClose];
  hints.forEach((el, i) => {
    const key = el.querySelector(".hint-key");
    if (key && hintTexts[i]) {
      el.innerHTML = "";
      el.appendChild(key);
      el.append(" " + hintTexts[i]);
    }
  });

  // Update graph node labels with Chinese names
  nodeGroups.selectAll(".node-name-label").text(d => {
    const zhData = scholarZh[d.id];
    if (lang === "zh" && zhData && zhData.zhName) return zhData.zhName;
    return d.name;
  });

  // If detail panel is open, refresh it
  if (document.getElementById("detail-panel").classList.contains("open") && window._currentDetailScholar) {
    openDetail(window._currentDetailScholar);
  }

  // Toggle buttons
  document.querySelectorAll(".lang-btn").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
}

// Photo cache
const photoCache = {};

async function fetchPhoto(scholarId) {
  if (photoCache[scholarId]) return photoCache[scholarId];
  // 1) 英文 Wikipedia
  const enWiki = wikiTitles[scholarId];
  if (enWiki) {
    try {
      const resp = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(enWiki)}`);
      if (resp.ok) {
        const data = await resp.json();
        const url = data.thumbnail?.source;
        if (url) { photoCache[scholarId] = url; return url; }
      }
    } catch(e) {}
  }
  // 2) 中文 Wikipedia(中国本土人物)
  const zhWiki = zhWikiTitles[scholarId];
  if (zhWiki) {
    try {
      const resp = await fetch(`https://zh.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(zhWiki)}`);
      if (resp.ok) {
        const data = await resp.json();
        const url = data.thumbnail?.source;
        if (url) { photoCache[scholarId] = url; return url; }
      }
    } catch(e) {}
  }
  // 3) Twitter avatar via unavatar.io(无 Wikipedia 但活跃在 X 的 AI 大佬)
  const tw = twitterHandles[scholarId];
  if (tw) {
    const url = `https://unavatar.io/twitter/${tw}?fallback=false`;
    const ok = await new Promise(resolve => {
      const img = new Image();
      img.onload = () => resolve(true);
      img.onerror = () => resolve(false);
      img.src = url;
    });
    if (ok) { photoCache[scholarId] = url; return url; }
  }
  // 4) 终极兜底:ui-avatars 生成彩色 monogram(每人 deterministic 颜色)
  const scholar = scholars.find(s => s.id === scholarId);
  if (scholar) {
    const colors = ['0a84ff','30d158','ff375f','ff9f0a','5e5ce6','bf5af2','64d2ff','ffd60a','ff9500','32d74b'];
    const hash = scholarId.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
    const bg = colors[hash % colors.length];
    const url = `https://ui-avatars.com/api/?name=${encodeURIComponent(scholar.name)}&background=${bg}&color=fff&size=200&bold=true&font-size=0.4`;
    photoCache[scholarId] = url;
    return url;
  }
  return null;
}

// openDetail with i18n support
function openDetail(d) {
  const panel = document.getElementById("detail-panel");
  panel.classList.add("open");
  window._currentDetailScholar = d;

  // Avatar — always reset to placeholder first
  const initials = d.name.split(" ").map(w => w[0]).join("").slice(0, 2);
  const oldAvatar = document.getElementById("detail-avatar");
  const placeholder = document.createElement("div");
  placeholder.className = "detail-avatar-placeholder";
  placeholder.id = "detail-avatar";
  placeholder.innerHTML = `<span>${initials}</span>`;
  oldAvatar.replaceWith(placeholder);

  // Load photo
  const currentId = d.id;
  if (photoCache[d.id]) {
    const img = document.createElement("img");
    img.className = "detail-avatar";
    img.id = "detail-avatar";
    img.alt = d.name;
    img.src = photoCache[d.id];
    placeholder.replaceWith(img);
  } else {
    fetchPhoto(d.id).then(url => {
      // Only update if panel still shows same person
      const nameEl = document.getElementById("detail-name");
      if (!nameEl || nameEl.textContent !== d.name) return;
      const el = document.getElementById("detail-avatar");
      if (el && url) {
        const img = document.createElement("img");
        img.className = "detail-avatar";
        img.id = "detail-avatar";
        img.alt = d.name;
        img.src = url;
        el.replaceWith(img);
      }
    });
  }

  const t = i18n[currentLang];
  const zh = scholarZh[d.id];
  const displayName = (currentLang === "zh" && zh && zh.zhName) ? zh.zhName + "  " + d.name : d.name;

  document.getElementById("detail-name").textContent = displayName;

  if (currentLang === "zh" && zh) {
    document.getElementById("detail-title").textContent = zh.title;
    document.getElementById("detail-bio").textContent = zh.bio;
  } else {
    document.getElementById("detail-title").textContent = d.title;
    document.getElementById("detail-bio").textContent = d.bio;
  }

  const orgEl = document.getElementById("detail-org");
  const c = getColor(d.org);
  orgEl.textContent = d.org;
  orgEl.style.background = c + "18";
  orgEl.style.color = c;
  orgEl.style.border = `0.5px solid ${c}32`;

  // Papers
  const papersEl = document.getElementById("detail-papers");
  const papersSection = document.getElementById("detail-papers-section");
  if (d.papers && d.papers.length) {
    papersSection.style.display = "block";
    papersEl.innerHTML = d.papers.map(p => {
      const title = p.url ? `<a class="paper-link" href="${p.url}" target="_blank" rel="noopener">${p.t}</a>` : `<span class="paper-title">${p.t}</span>`;
      return `<div class="paper-entry"><span class="paper-year">${p.y}</span>${title}</div>`;
    }).join("");
  } else {
    papersSection.style.display = "none";
  }

  // Section titles
  const sectionTitles = document.querySelectorAll(".detail-section-title");
  if (sectionTitles[0]) sectionTitles[0].textContent = t.sectionAbout;
  if (sectionTitles[1]) sectionTitles[1].textContent = t.sectionPapers;
  if (sectionTitles[2]) sectionTitles[2].textContent = t.sectionConnections;

  // Connections
  const connsEl = document.getElementById("detail-connections");
  const related = connections.filter(c => {
    const s = typeof c.source === 'object' ? c.source.id : c.source;
    const tt = typeof c.target === 'object' ? c.target.id : c.target;
    return s === d.id || tt === d.id;
  });
  connsEl.innerHTML = related.map(c => {
    const s = typeof c.source === 'object' ? c.source.id : c.source;
    const tt = typeof c.target === 'object' ? c.target.id : c.target;
    const oid = s === d.id ? tt : s;
    const o = scholars.find(sc => sc.id === oid);
    if (!o) return '';
    const label = currentLang === "zh" ? (connLabelZh[c.label] || c.label) : c.label;
    const typeBadge = t.typeLabels[c.type];
    return `<div class="conn-entry" data-id="${o.id}">
      <div class="conn-dot" style="background:${getColor(o.org)}"></div>
      <div class="conn-info"><div class="conn-name">${(currentLang === "zh" && scholarZh[o.id] && scholarZh[o.id].zhName) ? scholarZh[o.id].zhName + "  " + o.name : o.name}</div><div class="conn-relation">${label}</div></div>
      <span class="conn-type-badge">${typeBadge}</span>
    </div>`;
  }).join("");

  connsEl.querySelectorAll(".conn-entry").forEach(el => {
    el.addEventListener("click", () => {
      const target = scholars.find(s => s.id === el.dataset.id);
      if (target) {
        openDetail(target);
        const tr = d3.zoomTransform(svg.node());
        svg.transition().duration(600).ease(d3.easeCubicInOut).call(
          zoomBehavior.transform,
          d3.zoomIdentity.translate(W / 2 - target.x * tr.k, H / 2 - target.y * tr.k).scale(tr.k)
        );
      }
    });
  });
};

function renderGeoMap() {
  const svg = document.getElementById("geo-svg");
  if (!svg) return;
  const counts = {};
  Object.values(cityMap).forEach(city => { counts[city] = (counts[city] || 0) + 1; });

  // Simplified world landmasses
  let html = '';
  // North America
  html += '<path class="geo-outline" d="M15,15 L75,12 L80,25 L85,45 L75,60 L60,70 L40,65 L25,55 L15,40 Z"/>';
  // Europe
  html += '<path class="geo-outline" d="M120,18 L150,15 L155,30 L148,42 L135,45 L122,40 L118,28 Z"/>';
  // Asia
  html += '<path class="geo-outline" d="M155,25 L200,20 L240,25 L260,35 L255,55 L240,70 L220,75 L200,72 L180,65 L165,55 L158,42 Z"/>';
  // Japan
  html += '<path class="geo-outline" d="M248,40 L255,38 L258,48 L252,55 L248,48 Z"/>';

  Object.entries(geoPositions).forEach(([city, pos]) => {
    const count = counts[city] || 0;
    if (count === 0) return;
    const r = Math.max(Math.min(Math.sqrt(count) * 4.5, 20), 5);
    html += `<circle class="geo-bubble" cx="${pos.x}" cy="${pos.y}" r="${r}"/>`;
    html += `<text class="geo-count" x="${pos.x}" y="${pos.y + 2.5}">${count}</text>`;
    const labelY = pos.y + r + 8;
    const label = currentLang === "zh" ? pos.label : pos.labelEn;
    html += `<text class="geo-label" x="${pos.x}" y="${labelY}">${label}</text>`;
  });

  svg.innerHTML = html;
  const heading = document.getElementById("geo-heading");
  if (heading) heading.textContent = currentLang === "zh" ? "学者地域分布" : "Location Distribution";
}

renderGeoMap();
const _origApplyLang = applyLanguage;
applyLanguage = function(lang) { _origApplyLang(lang); renderGeoMap(); };
