/* ===== SVG Styles ===== */

/* Links — 4 tiers of visual weight */
.link-line {
  transition: stroke-opacity 0.35s ease, stroke-width 0.35s ease;
  stroke-linecap: round;
}
/* Cofounder: strongest bond, solid bright green */
.link-line.type-cofounder {
  stroke: #30d158;
  stroke-width: 2.5;
  stroke-opacity: 0.5;
}
/* Coauthor: strong academic tie, solid blue */
.link-line.type-coauthor {
  stroke: #2997ff;
  stroke-width: 1.8;
  stroke-opacity: 0.35;
}
/* Advisor: mentor line, dashed cyan */
.link-line.type-advisor {
  stroke: #64d2ff;
  stroke-width: 1.8;
  stroke-opacity: 0.4;
  stroke-dasharray: 8 5;
}
/* Colleague: 真同事(同公司同期共事过) */
.link-line.type-colleague {
  stroke: rgba(255, 255, 255, 0.5);
  stroke-width: 0.8;
  stroke-opacity: 0.18;
  stroke-dasharray: 2 6;
}

.node-group {
  transition: opacity 0.3s ease;
}
.node-glow {
  transition: opacity 0.3s ease;
}
.node-label {
  font-family: 'SF Pro Text', -apple-system, sans-serif;
  font-weight: 500;
  fill: rgba(255, 255, 255, 0.64);
  text-anchor: middle;
  pointer-events: none;
  transition: fill 0.3s, font-size 0.3s;
}

/* Dim / Highlight states */
.node-group.dimmed { opacity: 0.06; }
.node-group.highlighted { opacity: 1; }
.node-group.highlighted .node-label {
  fill: var(--apple-white);
  font-weight: 600;
}
.node-group.highlighted .node-glow { opacity: 0.5; }

.link-line.dimmed { stroke-opacity: 0.015 !important; }
.link-line.highlighted.type-cofounder { stroke-opacity: 0.85 !important; stroke-width: 3.5px !important; }
.link-line.highlighted.type-coauthor { stroke-opacity: 0.75 !important; stroke-width: 3px !important; }
.link-line.highlighted.type-advisor { stroke-opacity: 0.7 !important; stroke-width: 2.5px !important; }
.link-line.highlighted.type-colleague { stroke-opacity: 0.5 !important; stroke-width: 1.5px !important; stroke-dasharray: none !important; }

  // Deep Learning Trio
  { id:"hinton", name:"Geoffrey Hinton", org:"University of Toronto", title:"Godfather of Deep Learning · Turing Award 2018 · Nobel Prize 2024", field:["deep-learning"],
    bio:"Born 1947 in London. Studied at Clifton College, then earned a BA in Experimental Psychology at King's College Cambridge (1970). After a year apprenticing as a carpenter, pursued a PhD in AI at the University of Edinburgh (1978) under Christopher Longuet-Higgins. Postdoc at Sussex, then joined Carnegie Mellon in the 1980s as part of the PDP (Parallel Distributed Processing) group. Moved to the University of Toronto in 1987 where he has remained ever since. Published the landmark backpropagation paper (1986, Nature) with Rumelhart & Williams. Introduced Boltzmann machines (1985), deep belief nets (2006), and co-authored AlexNet (2012) with Krizhevsky and Sutskever, which won ImageNet by a historic margin and ignited the deep learning revolution. Co-founded the Vector Institute (2017). Joined Google Brain in 2013, resigned in May 2023 to speak freely about AI risks. Shared the Turing Award (2018) with LeCun and Bengio. Awarded the Nobel Prize in Physics (2024) alongside John Hopfield.",

  { id:"lecun", name:"Yann LeCun", org:"AMI Labs", title:"Founder of AMI Labs · Turing Award 2018", field:["deep-learning","vision"],
    bio:"Born 1960 near Paris, France. Earned an engineering degree from ESIEE Paris (1983), then a PhD in Computer Science from Universite Pierre et Marie Curie (1987). Did a postdoc with Geoffrey Hinton at the University of Toronto (1987-88), a pivotal experience. Joined AT&T Bell Labs (1988-1996) where he developed convolutional neural networks (CNNs) and LeNet for handwritten digit recognition -- one of the first practical deep learning systems deployed in banking. Became a professor at NYU (2003), founded the Center for Data Science (2012). Became the first director of Facebook AI Research / FAIR (2013) and rose to Chief AI Scientist at Meta. A vocal advocate for self-supervised learning and frequent critic of large language models' reasoning capabilities. Shared the Turing Award (2018). Left Meta in November 2025 after FAIR budget cuts and leadership changes. Founded Advanced Machine Intelligence Labs (AMI Labs) in Paris, targeting a $3.5B valuation before even launching -- focused on building 'world models': AI systems that understand physics, maintain persistent memory, and plan complex actions rather than simply predicting the next word.",
    papers:[{y:"1989",t:"Backpropagation applied to handwritten zip code recognition [15K citations]",url:"https://ieeexplore.ieee.org/document/6795724"},{y:"1998",t:"Gradient-based learning applied to document recognition [52K citations]",url:"http://yann.lecun.com/exdb/publis/pdf/lecun-01a.pdf"},{y:"2015",t:"Deep Learning (Nature review with Hinton & Bengio) [60K citations]",url:"https://www.nature.com/articles/nature14539"}]},
  { id:"bengio", name:"Yoshua Bengio", org:"Mila / U. Montreal", title:"Founder of Mila · Turing Award 2018", field:["deep-learning","nlp"],

    papers:[{y:"2003",t:"A Neural Probabilistic Language Model [12K citations]",url:"https://www.jmlr.org/papers/v3/bengio03a.html"},{y:"2014",t:"Generative Adversarial Nets (advisor) [55K]",url:"https://arxiv.org/abs/1406.2661"},{y:"2014",t:"Neural Machine Translation by Jointly Learning to Align and Translate [28K]",url:"https://arxiv.org/abs/1409.0473"}]},

  // Transformer Authors
  { id:"vaswani", name:"Ashish Vaswani", org:"Essential AI", title:"Co-inventor of the Transformer", field:["nlp"],
    bio:"Born 1986 in India. Earned B.Tech in Computer Science from Birla Institute of Technology, Mesra (2002), then a PhD from the University of Southern California (2014) under advisors David Chiang and Liang Huang. Joined Google Brain in 2016 where he became the lead author of the landmark paper 'Attention Is All You Need' (2017), introducing the Transformer architecture that revolutionized all of AI -- from NLP to vision to protein folding. Later co-founded Adept AI, then departed to co-found Essential AI where he now serves as CEO.",
    papers:[{y:"2017",t:"Attention Is All You Need [160K citations]",url:"https://arxiv.org/abs/1706.03762"}]},
  { id:"shazeer", name:"Noam Shazeer", org:"Google DeepMind", title:"Co-inventor of Transformer · Co-founded Character.ai", field:["nlp"],
    bio:"Earned a BS in Mathematics and Computer Science from Duke University (1998). Joined Google in 2000 as one of the earliest engineers, where he significantly improved Google's search spelling corrector. Became one of the most prolific researchers in modern AI: co-authored the Transformer paper (2017), pioneered Mixture of Experts scaling (2017), and built the chatbot Meena. After Google declined to release Meena publicly, he left in 2021 to co-found Character.AI with Daniel de Freitas. In August 2024, Google licensed Character.AI's technology in a deal worth $2.7B, bringing Shazeer back to Google to co-lead Gemini development. Named to TIME 100 AI (2023) and elected to the National Academy of Engineering (2026).",

  { id:"gomez", name:"Aidan Gomez", org:"Cohere", title:"Co-inventor of Transformer · CEO of Cohere", field:["nlp"],

  { id:"parmar", name:"Niki Parmar", org:"Essential AI", title:"Co-inventor of the Transformer", field:["nlp","vision"],

  { id:"uszkoreit", name:"Jakob Uszkoreit", org:"Inceptive", title:"Co-inventor of Transformer · Bio-AI Founder", field:["nlp"],

  // OpenAI / GPT
  { id:"sutskever", name:"Ilya Sutskever", org:"SSI", title:"Co-founder of OpenAI · Founded SSI", field:["deep-learning","safety"],

  { id:"radford", name:"Alec Radford", org:"OpenAI", title:"Creator of GPT and CLIP", field:["nlp","vision"],
    bio:"Born April 1993. Graduated from Olin College of Engineering, a small engineering school in Needham, Massachusetts. Joined OpenAI around 2016 and became one of the most impactful individual contributors in the history of AI. Lead author of GPT-1 (2018), which demonstrated that generative pre-training could produce strong language understanding. Followed with GPT-2 (2019), which was initially withheld due to concerns about misuse. Went on to lead DALL-E (text-to-image generation), CLIP (connecting vision and language), and Whisper (speech recognition). His work essentially created the foundation for the entire GPT era. Left OpenAI in December 2024 and became an advisor at Thinking Machines Lab (2025).",

    bio:"Earned a BS in Physics from Caltech (2010), then pursued a PhD in EECS at UC Berkeley under Pieter Abbeel. Co-founded OpenAI in late 2015, shortly before completing his PhD. At OpenAI, he developed TRPO (2015) and PPO (Proximal Policy Optimization, 2017), which became the most widely used reinforcement learning algorithm -- and the core algorithm behind RLHF that makes ChatGPT work (23,000+ citations). Co-led OpenAI's post-training team (2022-2024), directly overseeing ChatGPT's development. Joined Anthropic in August 2024 to focus on AI safety. Later moved to Thinking Machines Lab as Chief Scientist (February 2025).",
    papers:[{y:"2015",t:"Trust Region Policy Optimization (TRPO) [11K citations]",url:"https://arxiv.org/abs/1502.05477"},{y:"2017",t:"Proximal Policy Optimization (PPO) [23K citations]",url:"https://arxiv.org/abs/1707.06347"}]},
  { id:"karpathy", name:"Andrej Karpathy", org:"Eureka Labs", title:"Former Tesla AI Director · OpenAI Founding Member", field:["deep-learning","vision"],
    bio:"Born 1986 in Bratislava, Czechoslovakia (now Slovakia). Relocated to Toronto at age 15. Earned a BS in Computer Science and Physics from the University of Toronto (2009), MS from the University of British Columbia (2011), and PhD from Stanford (2015) under Fei-Fei Li, working at the intersection of NLP and computer vision. Created and taught Stanford's legendary CS 231n course, which grew from 150 to 750 students. Became a founding member of OpenAI (2015-2017), then joined Tesla as Director of AI and Autopilot Vision (2017-2022, reporting directly to Elon Musk). Returned briefly to OpenAI (2023-2024). Founded Eureka Labs (July 2024) to build AI-native education. Also known for his popular YouTube channel and Rubik's cube tutorials (9M+ views). Named MIT Tech Review Innovators Under 35 (2020).",
    papers:[{y:"2015",t:"Deep Visual-Semantic Alignments [8K]",url:"https://arxiv.org/abs/1412.2306"},{y:"2015",t:"Visualizing and Understanding Recurrent Networks [3K citations]",url:"https://arxiv.org/abs/1506.02078"}]},
  { id:"altman", name:"Sam Altman", org:"OpenAI", title:"CEO of OpenAI", field:["nlp"],
    bio:"Born 1985 in Chicago, grew up in Clayton, Missouri. Attended John Burroughs School, then enrolled at Stanford for Computer Science but dropped out after two years (2005). Co-founded Loopt at age 19, a location-based social networking startup (raised $30M+, acquired by Green Dot for $43.4M in 2012). Joined Y Combinator as a partner (2011) and became its president in 2014, succeeding Paul Graham. Co-founded OpenAI in 2015 as a nonprofit AI research lab, became CEO in March 2019 and led its transformation into the company behind ChatGPT (launched Nov 2022) and GPT-4. Fired by the OpenAI board on November 17, 2023, but was reinstated just five days later after a dramatic employee revolt where over 700 of 770 staff threatened to leave.",
    papers:[]},
  { id:"brown", name:"Tom Brown", org:"OpenAI", title:"Lead author of GPT-3", field:["nlp"],
    bio:"Lead author of the GPT-3 paper (2020), 'Language Models are Few-Shot Learners', which demonstrated that a 175-billion parameter model could perform tasks with just a few examples in context, without fine-tuning. This paper was a watershed moment that proved the scaling hypothesis and directly sparked the large language model revolution, leading to ChatGPT and the entire generative AI wave.",
    papers:[{y:"2020",t:"Language Models are Few-Shot Learners (GPT-3) [32K citations]",url:"https://arxiv.org/abs/2005.14165"}]},

  // Anthropic
  { id:"damodei", name:"Dario Amodei", org:"Anthropic", title:"CEO & Co-founder of Anthropic", field:["safety","nlp"],
    bio:"Born 1983 in San Francisco. Father was an Italian-American leather craftsman from Tuscany; mother was Jewish American from Chicago. Attended Lowell High School in San Francisco, USA Physics Olympiad team (2000). BS Physics Stanford, PhD Biophysics Princeton (2011) under Michael J. Berry and William Bialek. Postdoc Stanford School of Medicine. Pivoted to AI: joined Baidu Silicon Valley AI Lab (SVAIL) Nov 2014–Oct 2015 under Andrew Ng, co-led Deep Speech 2 (English+Mandarin end-to-end speech recognition, MIT TR Top 10 Breakthrough 2015) — formative experience that revealed scaling laws empirically. Then OpenAI VP Research (2016-2021) leading scaling+GPT. Co-founded Anthropic Jan 2021 with sister Daniela and other ex-OpenAI members on safety divergence. 2026.4 Anthropic ARR $30B reportedly overtook OpenAI's $25B.",
    papers:[{y:"2020",t:"Scaling Laws for Neural Language Models [4K]",url:"https://arxiv.org/abs/2001.08361"},{y:"2022",t:"Constitutional AI: Harmlessness from AI Feedback [2K]",url:"https://arxiv.org/abs/2212.08073"}]},
  { id:"daniela", name:"Daniela Amodei", org:"Anthropic", title:"President & Co-founder of Anthropic", field:["safety"],
    bio:"Dario's older sister. Before entering tech, worked in finance at Stripe. Joined OpenAI as VP of Operations, managing the business and organizational side. Co-founded Anthropic with Dario in 2021, serving as President. Leads all business operations, go-to-market strategy, and company culture.", papers:[]},
  { id:"olah", name:"Chris Olah", org:"Anthropic", title:"Pioneer of Neural Network Interpretability", field:["safety","deep-learning"],
    bio:"Born around 1991 in Toronto. Graduated from The Abelard School (National AP Scholar, 2010). Dropped out of university at age 18 and received a Thiel Fellowship -- Peter Thiel's program paying young people $100K to skip college and build things. With no degree, gave a talk at Google that impressed Jeff Dean, who offered him an internship. Interned at Google Brain for 2 years, then stayed for 4 years total. Became known for his exceptionally clear blog posts on neural network visualization (colah.github.io), which are widely cited in the field. Led the interpretability team at OpenAI. Co-founded Anthropic (2021) where he now leads interpretability research, producing groundbreaking work on mechanistic interpretability -- mapping the internal features and circuits inside large language models. One of the most prominent self-taught researchers in AI.",
    papers:[{y:"2017",t:"Feature Visualization [2K citations]",url:"https://distill.pub/2017/feature-visualization/"},{y:"2020",t:"Zoom In: An Introduction to Circuits [1K citations]",url:"https://distill.pub/2020/circuits/zoom-in/"},{y:"2024",t:"Scaling Monosemanticity [500+ citations]",url:"https://transformer-circuits.pub/2024/scaling-monosemanticity/index.html"}]},
  { id:"clark", name:"Jack Clark", org:"Anthropic", title:"Co-founder of Anthropic", field:["safety"],
    bio:"Former journalist covering AI for Bloomberg and The Register before transitioning to the industry side. Joined OpenAI as Policy Director, where he helped shape the organization's approach to AI governance and public communication. Created the influential 'Import AI' newsletter, one of the most widely read weekly AI digests. Co-founded Anthropic in 2021, focusing on AI policy, safety research, and responsible deployment.", papers:[]},

  // Google DeepMind
  { id:"hassabis", name:"Demis Hassabis", org:"Google DeepMind", title:"CEO of Google DeepMind · Nobel Prize 2024", field:["rl","deep-learning"],
    bio:"Born 1976 in London; father Greek Cypriot, mother Chinese Singaporean. A chess prodigy from age 4, achieving master standard (Elo 2300) by age 13 and captaining the England junior chess team. Attended Queen Elizabeth's School in Barnet. At 17, joined Bullfrog Productions where he co-designed the classic game Theme Park (1994) with Peter Molyneux. Became lead AI programmer on Black & White at Lionhead Studios (2001). Founded his own game studio Elixir Studios (1998-2005). Then pivoted to neuroscience: earned a PhD in Cognitive Neuroscience from University College London (2009) under Eleanor Maguire, studying memory and imagination in the hippocampus. Read at Queens' College Cambridge for his undergraduate degree (Computer Science, double first, 1997). Co-founded DeepMind in 2010 with Shane Legg and Mustafa Suleyman. Google acquired DeepMind for ~$500M in 2014. Led AlphaGo (defeated Lee Sedol, 2016), AlphaFold (solved protein folding, Science Breakthrough of the Year 2021), and Gemini. Awarded the Nobel Prize in Chemistry (2024) alongside John Jumper for AlphaFold's protein structure prediction.",
    papers:[{y:"2016",t:"Mastering the game of Go (AlphaGo) [16K citations]",url:"https://www.nature.com/articles/nature16961"},{y:"2021",t:"Highly accurate protein structure prediction (AlphaFold2) [34K citations]",url:"https://www.nature.com/articles/s41586-021-03819-2"},{y:"2024",t:"Gemini: A Family of Highly Capable Multimodal Models [3K]",url:"https://arxiv.org/abs/2312.11805"}]},
  { id:"silver", name:"David Silver", org:"Google DeepMind", title:"Lead researcher of AlphaGo & AlphaZero", field:["rl"],
    bio:"Earned a BA from Christ's College, Cambridge (1997). Completed a PhD at the University of Alberta (2009), with a thesis on reinforcement learning and simulation-based search in computer Go -- laying the theoretical groundwork for what would become AlphaGo. Consulted for DeepMind from 2010, joined full-time in 2013. Led the reinforcement learning research group and the AlphaGo project that defeated world champion Lee Sedol in 2016 (watched live by 200M+ people). Created AlphaGo Zero (learning from scratch) and AlphaZero (mastering chess, shogi, and Go from self-play alone). Won the ACM Prize in Computing (2019) and was elected Fellow of the Royal Society (2021). Left DeepMind in January 2026 and founded Ineffable Intelligence.",
    papers:[{y:"2016",t:"Mastering the game of Go (AlphaGo) [16K]",url:"https://www.nature.com/articles/nature16961"},{y:"2017",t:"Mastering Chess and Shogi by Self-Play (AlphaZero) [7K]",url:"https://arxiv.org/abs/1712.01815"}]},
  { id:"legg", name:"Shane Legg", org:"Google DeepMind", title:"Co-founder of DeepMind · Chief AGI Scientist", field:["rl","safety"],
    bio:"New Zealand-born AI researcher. Completed his PhD at IDSIA in Switzerland under Marcus Hutter. In his 2007 thesis, he formally defined and coined the term 'artificial general intelligence' (AGI), providing a mathematical framework for measuring machine intelligence. Co-founded DeepMind in 2010 with Demis Hassabis and Mustafa Suleyman. Now serves as Chief AGI Scientist at Google DeepMind, leading safety and AGI research.",
    papers:[{y:"2007",t:"Universal Intelligence: A Definition of Machine Intelligence [2K]",url:"https://arxiv.org/abs/0712.3329"}]},
  { id:"suleyman", name:"Mustafa Suleyman", org:"Microsoft AI", title:"CEO of Microsoft AI · Co-founder of DeepMind", field:["rl"],
    bio:"Born 1984 in London to a Syrian-born cab driver father and English nurse mother. Dropped out of Oxford at 19. Before AI, co-founded a telephone counseling service and worked as a policy officer at the Mayor of London's office. Co-founded DeepMind (2010) with Hassabis and Legg, leading the applied AI division. After DeepMind was acquired by Google, moved to a VP role at Google. Founded Inflection AI in 2022, creating the Pi chatbot. In 2024, Microsoft hired Suleyman and most of Inflection's team in a $650M deal, making him CEO of Microsoft AI. Published 'The Coming Wave' (2023), a book on AI risks.", papers:[]},
  { id:"dean", name:"Jeff Dean", org:"Google DeepMind", title:"Chief Scientist at Google DeepMind", field:["deep-learning","nlp"],
    bio:"Earned a BS from the University of Minnesota and a PhD from the University of Washington under Craig Chambers. Joined Google in 1999 as one of the earliest engineers. Built the foundational systems that enabled Google to scale: MapReduce, BigTable, Spanner, and later TensorFlow. Co-founded Google Brain in 2011 with Andrew Ng, Greg Corrado, and Rajat Monga -- the famous project that used 16,000 CPUs to train a network that learned to recognize cats from YouTube videos. Became SVP of Google AI and now serves as Chief Scientist at Google DeepMind, overseeing Gemini development. Known as one of the greatest systems engineers in computing history.",
    papers:[{y:"2012",t:"Large Scale Distributed Deep Networks [5K citations]",url:"https://papers.nips.cc/paper/2012/hash/6aca97005c68f1206823815f66102863-Abstract.html"},{y:"2016",t:"TensorFlow: A System for Large-Scale ML [44K]",url:"https://arxiv.org/abs/1605.08695"}]},

  // Stanford
  { id:"feifei", name:"Fei-Fei Li", org:"Stanford", title:"Creator of ImageNet · Stanford HAI Co-Director", field:["vision"],
    bio:"Born 1976 in Beijing, grew up in Chengdu, Sichuan, China. Immigrated to Parsippany, New Jersey at age 16 with her parents. Worked weekends at her family's dry-cleaning business while attending Parsippany High School. Earned a BA in Physics from Princeton University (1999, on a full scholarship), then an MS and PhD in Electrical Engineering from Caltech (2005) under Pietro Perona and Christof Koch. As an assistant professor at Princeton (2007), launched the ImageNet project, using Amazon Mechanical Turk to label 14M+ images across 22K categories. The ImageNet Large Scale Visual Recognition Challenge she created became the catalyst for the deep learning revolution when AlexNet won it in 2012. Joined Stanford as faculty (2009), tenured (2012), full professor (2018). Directed Stanford AI Lab (2013-2018), took a sabbatical as Chief Scientist of AI/ML at Google Cloud (2017-2018). Co-founded Stanford HAI (Human-Centered AI). Founded World Labs (2024). Won the Queen Elizabeth Prize for Engineering (2025).",
    papers:[{y:"2009",t:"ImageNet: A Large-Scale Hierarchical Image Database [50K citations]",url:"https://ieeexplore.ieee.org/document/5206848"},{y:"2015",t:"Deep Visual-Semantic Alignments for Generating Image Descriptions [8K]",url:"https://arxiv.org/abs/1412.2306"}]},
  { id:"ng", name:"Andrew Ng", org:"Stanford / DeepLearning.AI", title:"Co-founder of Coursera & Google Brain", field:["deep-learning"],
    bio:"Born 1976 in London to Hong Kong immigrant parents (father a hematologist, mother an arts administrator). Grew up in Singapore, attending the prestigious Raffles Institution. Earned a triple major in Computer Science, Statistics, and Economics from Carnegie Mellon (1997), an MS in EECS from MIT (1998), and a PhD in Computer Science from UC Berkeley (2002) under Michael I. Jordan. Joined Stanford as a professor (2002) where his CS229 Machine Learning course became the most popular class on campus (1000+ students). Co-founded Google Brain in 2011 with Jeff Dean -- their famous experiment trained a network on 16,000 CPUs that learned to recognize cats in YouTube videos. Co-founded Coursera (2012) with Daphne Koller, democratizing education for 8M+ students. Served as Chief Scientist at Baidu (2014-2017), leading 1,300 AI researchers. Founded DeepLearning.AI (2017), Landing AI (2018), and the AI Fund ($175M venture fund).",
    papers:[{y:"2011",t:"Building High-level Features Using Large Scale Unsupervised Learning [8K]",url:"https://arxiv.org/abs/1112.6209"},{y:"2012",t:"Large Scale Distributed Deep Networks [5K]",url:"https://papers.nips.cc/paper/2012/hash/6aca97005c68f1206823815f66102863-Abstract.html"}]},
  { id:"manning", name:"Christopher Manning", org:"Stanford", title:"Stanford NLP Group Director", field:["nlp"],
    bio:"Australian-born computational linguist. Earned degrees from the Australian National University, then a PhD in Linguistics from Stanford (1994). Joined Stanford's faculty and became one of the most influential figures in NLP. Co-authored the foundational textbook 'Foundations of Statistical Natural Language Processing' (1999) and 'Introduction to Information Retrieval' (2008). Directed the Stanford NLP Group, producing tools (Stanford CoreNLP, Stanford Parser) used across the industry. Led the development of GloVe word embeddings (2014). Serves as Co-Director of Stanford HAI alongside Fei-Fei Li. His teaching and research have shaped multiple generations of NLP researchers.",
    papers:[{y:"2014",t:"GloVe: Global Vectors for Word Representation [33K citations]",url:"https://nlp.stanford.edu/pubs/glove.pdf"}]},
  { id:"liang", name:"Percy Liang", org:"Stanford", title:"Creator of HELM benchmark · Founded Together AI", field:["nlp","safety"],
    bio:"Stanford professor who became one of the most important voices in LLM evaluation and accountability. Created HELM (Holistic Evaluation of Language Models, 2022), the most comprehensive and standardized benchmark for evaluating large language models across multiple dimensions including accuracy, robustness, fairness, and toxicity. Led the Stanford Alpaca project (2023), demonstrating that a small model fine-tuned on GPT-generated data could match larger models. Co-founded Together AI to democratize access to open-source AI infrastructure.",
    papers:[{y:"2022",t:"Holistic Evaluation of Language Models (HELM) [2K]",url:"https://arxiv.org/abs/2211.09110"},{y:"2023",t:"Alpaca: A Strong Open-Source Instruction-Following Model [3K]",url:"https://crfm.stanford.edu/2023/03/13/alpaca.html"}]},

  // Other Key Figures
  { id:"goodfellow", name:"Ian Goodfellow", org:"Google DeepMind", title:"Inventor of GANs", field:["deep-learning","vision"],
    bio:"Born 1987, grew up in the San Francisco area. Earned a BS and MS in Computer Science from Stanford (under Andrew Ng's group), then a PhD in Machine Learning from the Universite de Montreal (2015) under Yoshua Bengio and Aaron Courville. During his PhD, famously invented Generative Adversarial Networks (GANs) in 2014 -- the idea allegedly came to him during a conversation at a bar and he went home and coded the first version that night. Co-authored the definitive 'Deep Learning' textbook (2016) with Bengio and Courville. Career: Google Brain (post-PhD), OpenAI (2016-2017), Google Research (2017-2019), Apple Director of ML in Special Projects (2019-2022, resigned over return-to-office policy), then Google DeepMind (2022-present). Named MIT Tech Review 35 Under 35 (2017).",
    papers:[{y:"2014",t:"Generative Adversarial Nets [55K citations]",url:"https://arxiv.org/abs/1406.2661"},{y:"2016",t:"Deep Learning (textbook) [60K]",url:"https://www.deeplearningbook.org/"}]},
  { id:"krizhevsky", name:"Alex Krizhevsky", org:"Independent", title:"Creator of AlexNet", field:["deep-learning","vision"],
    bio:"Born in Ukraine, grew up in Canada. PhD student under Geoffrey Hinton at the University of Toronto. In 2012, built AlexNet with Hinton and Ilya Sutskever, a deep convolutional neural network that won the ImageNet competition by a massive margin (error rate of 15.3% vs. the runner-up's 26.2%). This result is widely considered the moment that ignited the modern deep learning era, proving that GPU-trained deep networks could dramatically outperform traditional computer vision. The three co-founded DNNresearch, which was acquired by Google in 2013. Has maintained a relatively low public profile since.",
    papers:[{y:"2012",t:"ImageNet Classification with Deep CNNs (AlexNet)",url:"https://papers.nips.cc/paper/2012/hash/c399862d3b9d6b76c8436e924a68c45b-Abstract.html"}]},
  { id:"abbeel", name:"Pieter Abbeel", org:"UC Berkeley / Covariant", title:"Robotics & RL Pioneer", field:["rl"],
    bio:"Born in Belgium. Earned his PhD from Stanford under Andrew Ng (2008), with a thesis on apprenticeship learning and inverse reinforcement learning. Joined UC Berkeley as a professor where he became a leading figure in robot learning and deep reinforcement learning. His lab pioneered sim-to-real transfer (training robots in simulation and deploying in the real world) and domain randomization. Founded Covariant (AI for warehouse robot arms), bringing deep learning to industrial robotics. Advised John Schulman's PhD (the creator of PPO). Has trained numerous prominent AI researchers through his Berkeley lab.",
    papers:[{y:"2004",t:"Apprenticeship Learning via Inverse RL [5K]",url:"https://ai.stanford.edu/~ang/papers/icml04-apprentice.pdf"},{y:"2017",t:"Domain Randomization for Transfer [3K]",url:"https://arxiv.org/abs/1703.06907"}]},
  { id:"levine", name:"Sergey Levine", org:"UC Berkeley / Physical Intelligence", title:"Robot Learning Pioneer", field:["rl"],
    bio:"UC Berkeley professor who pioneered end-to-end robot learning from raw pixels. His work demonstrated that robots could learn complex manipulation tasks directly from visual input using deep reinforcement learning, without hand-engineered features. Key contributor to offline RL (learning from pre-collected datasets rather than online interaction). Co-founded Physical Intelligence (pi), a company building foundation models for robotics. His research bridges the gap between the success of large language models and the physical world.",
    papers:[{y:"2016",t:"End-to-End Training of Deep Visuomotor Policies [4K]",url:"https://arxiv.org/abs/1504.00702"},{y:"2020",t:"Offline Reinforcement Learning [3K]",url:"https://arxiv.org/abs/2005.01643"}]},
  { id:"ho", name:"Jonathan Ho", org:"Google DeepMind", title:"Creator of Diffusion Models (DDPM)", field:["vision"],
    bio:"Earned his PhD from UC Berkeley under Pieter Abbeel and Stefano Ermon. Created Denoising Diffusion Probabilistic Models (DDPM, 2020), which revived and dramatically improved the diffusion-based approach to generative modeling. DDPM became the foundational technology behind Stable Diffusion, DALL-E 2, Midjourney, Sora, and essentially all modern image and video generation systems. Joined Google Brain (now Google DeepMind) where he has continued advancing diffusion models and their applications to video generation.",
    papers:[{y:"2020",t:"Denoising Diffusion Probabilistic Models (DDPM) [12K]",url:"https://arxiv.org/abs/2006.11239"}]},
  { id:"wei", name:"Jason Wei", org:"OpenAI", title:"Discoverer of Chain-of-Thought Prompting", field:["nlp"],
    bio:"Researcher at Google Brain who made two of the most influential discoveries about large language models. First, chain-of-thought prompting (2022): showing that simply adding 'let's think step by step' to prompts dramatically improves LLM reasoning, a technique now used in virtually every AI application. Second, emergent abilities (2022): demonstrating that certain capabilities appear suddenly and unpredictably as models scale, fundamentally changing how the field thinks about scaling. Joined OpenAI to work on reasoning capabilities for next-generation models.",
    papers:[{y:"2022",t:"Chain-of-Thought Prompting Elicits Reasoning [7K citations]",url:"https://arxiv.org/abs/2201.11903"},{y:"2022",t:"Emergent Abilities of Large Language Models [4K]",url:"https://arxiv.org/abs/2206.07682"}]},
  { id:"anil", name:"Rohan Anil", org:"Google DeepMind", title:"Technical Lead of Gemini", field:["nlp"],
    bio:"Indian-born AI researcher who rose to become the technical lead of Google's most important AI project. Led the development of PaLM 2 and then the Gemini model family, Google's flagship multimodal AI system designed to compete with GPT-4. His work spans efficient training at scale, multilingual capabilities, and multimodal reasoning.",
    papers:[{y:"2023",t:"PaLM 2 Technical Report [2K]",url:"https://arxiv.org/abs/2305.10403"},{y:"2024",t:"Gemini: Highly Capable Multimodal Models [3K]",url:"https://arxiv.org/abs/2312.11805"}]},

  // ===== xAI =====
  { id:"musk", name:"Elon Musk", org:"xAI", title:"Founder of xAI · CEO of Tesla & SpaceX", field:["nlp"],
    bio:"Born 1971 in Pretoria, South Africa. Attended Queen's University in Ontario, then transferred to the University of Pennsylvania (BS Economics, BS Physics). Briefly enrolled in a Stanford PhD program but dropped out after two days to co-found Zip2 (sold for $307M), then X.com which merged into PayPal (sold to eBay for $1.5B). Founded SpaceX (2002), co-founded Tesla (2004). Was an early co-founder and funder of OpenAI (2015) but departed the board in 2018 citing conflicts with Tesla's AI work. Grew increasingly critical of OpenAI's shift to a for-profit model. Founded xAI in July 2023 with a team recruited from DeepMind, OpenAI, and Google. xAI built Grok, integrated into X (Twitter). Despite raising billions and building massive compute infrastructure (Colossus cluster), xAI faced a co-founder exodus -- by early 2026 only 2 of 12 original founders remained.",
    papers:[]},
  { id:"jimmyba", name:"Jimmy Ba", org:"xAI", title:"Co-creator of Adam Optimizer · xAI Co-founder", field:["deep-learning"],
    bio:"Born in China, raised in Canada. PhD from the University of Toronto under Geoffrey Hinton and Rich Zemel. Co-authored the Adam optimizer paper (2014) with Diederik Kingma -- the most-cited paper in all of AI with 95,000+ citations. Adam is used to train virtually every modern neural network. Became a professor at the University of Toronto. Joined xAI as a co-founder, credited for critical research influencing Grok 4's model quality. Departed xAI in February 2026.",
    papers:[{y:"2014",t:"Adam: A Method for Stochastic Optimization [136K citations]",url:"https://arxiv.org/abs/1412.6980"},{y:"2016",t:"Layer Normalization [12K]",url:"https://arxiv.org/abs/1607.06450"}]},
  { id:"szegedy", name:"Christian Szegedy", org:"xAI", title:"Creator of Inception/GoogLeNet · xAI Co-founder", field:["deep-learning","vision"],
    bio:"Hungarian-born computer scientist. PhD from the University of Bonn. Joined Google Research where he created the Inception architecture (GoogLeNet), winner of ILSVRC 2014, and pioneered the study of adversarial examples in neural networks alongside Ian Goodfellow. Also developed Batch Normalization, a technique now used in virtually all deep networks. Left Google to co-found xAI in 2023. Departed xAI in February 2025.",
    papers:[{y:"2014",t:"Going Deeper with Convolutions (GoogLeNet/Inception) [48K citations]",url:"https://arxiv.org/abs/1409.4842"},{y:"2015",t:"Batch Normalization [44K citations]",url:"https://arxiv.org/abs/1502.03167"},{y:"2013",t:"Intriguing properties of neural networks (adversarial examples) [11K]",url:"https://arxiv.org/abs/1312.6199"}]},
  { id:"gregyang", name:"Greg Yang", org:"xAI", title:"Tensor Programs / muP Creator · xAI Co-founder", field:["deep-learning"],
    bio:"Chinese-American mathematician and AI researcher. Earned a BA in Mathematics from Harvard. Worked at Microsoft Research where he developed Tensor Programs theory and muP (Maximal Update Parametrization) -- a framework for optimal hyperparameter transfer across model scales that has become essential for training large language models efficiently. Co-founded xAI in 2023. Stepped back from xAI in January 2026 citing health issues.",
    papers:[{y:"2021",t:"Tensor Programs V: Tuning Large Neural Networks via Zero-Shot Hyperparameter Transfer (muP) [500+]",url:"https://arxiv.org/abs/2203.03466"}]},

  // ===== Chinese / Chinese-origin AI Leaders =====
  { id:"kaiminghe", name:"Kaiming He", org:"MIT / Google DeepMind", title:"Creator of ResNet · Most-cited 21st Century Paper", field:["deep-learning","vision"],
    bio:"Born 1984 in Guangzhou, Guangdong, China. Attended Guangzhou Zhixin High School, where he scored first place in the entire Guangdong province on the 2003 college entrance exam. Earned a BS from Tsinghua University (2007), then a PhD in Information Engineering from the Chinese University of Hong Kong (2011, Multimedia Lab), with a thesis on image dehazing. Joined Microsoft Research Asia (MSRA) as a research scientist, where he created ResNet (Residual Networks, 2015) -- the paper 'Deep Residual Learning for Image Recognition' is the most-cited paper of the 21st century. ResNet's skip connections solved the vanishing gradient problem and enabled training of networks with 100+ layers. Also co-created Mask R-CNN for instance segmentation. Moved to Facebook AI Research (FAIR). Joined MIT as associate professor (2024), appointed Douglas Ross Career Development Professor. In 2025, also joined Google DeepMind while retaining MIT tenure, pursuing a dual academia + industry path.",
    papers:[{y:"2015",t:"Deep Residual Learning for Image Recognition (ResNet) [152K citations]",url:"https://arxiv.org/abs/1512.03385"},{y:"2017",t:"Mask R-CNN [28K citations]",url:"https://arxiv.org/abs/1703.06870"},{y:"2021",t:"Masked Autoencoders Are Scalable Vision Learners (MAE) [6K citations]",url:"https://arxiv.org/abs/2111.06377"}]},
  { id:"sainingxie", name:"Saining Xie", org:"AMI Labs", title:"Creator of DiT (Diffusion Transformers) · AMI Labs CSO", field:["vision"],
    bio:"Chinese-born computer vision researcher. Earned his PhD from UC San Diego. Best known for creating ConvNeXt (modernizing CNNs to match Transformer performance) and Diffusion Transformers (DiT, 2023) -- the architecture that replaced U-Nets in diffusion models and became the foundation for OpenAI's Sora video generation. Previously a researcher at Facebook AI Research (FAIR) and assistant professor at NYU. In 2026, joined Yann LeCun's AMI Labs as Chief Science Officer, working on world models.",
    papers:[{y:"2023",t:"Scalable Diffusion Models with Transformers (DiT) [3K]",url:"https://arxiv.org/abs/2212.09748"},{y:"2022",t:"A ConvNet for the 2020s (ConvNeXt) [5K]",url:"https://arxiv.org/abs/2201.03545"}]},
  { id:"quocle", name:"Quoc V. Le", org:"Google DeepMind", title:"Google Fellow · Co-founder of Google Brain", field:["deep-learning","nlp"],
    bio:"Born 1982 in Huong Thuy, Thua Thien Hue province, Vietnam. Grew up in rural Central Vietnam fascinated by machines and mathematics. Attended Quoc Hoc Hue High School. Moved to Australia in 2004, earning a Bachelor's degree from the Australian National University (working with Alex Smola on kernel methods). PhD at Stanford (2012) under Andrew Ng. Became a founding member of Google Brain in 2011 alongside Ng, Jeff Dean, and Greg Corrado -- led the famous experiment that trained a network on 16,000 CPUs to recognize cats in YouTube videos. Co-invented the sequence-to-sequence model (2014, with Sutskever and Vinyals), foundational for machine translation and later LLMs. Initiated and led AutoML/Neural Architecture Search at Google Brain (2017). Now a Google Fellow at Google DeepMind. Named MIT Technology Review Innovators Under 35 (2014).",
    papers:[{y:"2014",t:"Sequence to Sequence Learning with Neural Networks [21K]",url:"https://arxiv.org/abs/1409.3215"},{y:"2017",t:"Neural Architecture Search with Reinforcement Learning [7K]",url:"https://arxiv.org/abs/1611.01578"},{y:"2011",t:"Building High-level Features Using Large Scale Unsupervised Learning [8K]",url:"https://arxiv.org/abs/1112.6209"}]},
  { id:"liangwenfeng", name:"Liang Wenfeng", org:"DeepSeek", title:"Founder of DeepSeek", field:["nlp","deep-learning"],
    bio:"Born 1985 in Zhanjiang, Guangdong, China. Father was a school teacher who stressed the importance of learning. Earned a Bachelor's in Electronic Information Engineering from Zhejiang University (2007) and a Master's in Engineering (2010), researching target-tracking algorithms. Applied machine learning to quantitative finance: founded the hedge fund High-Flyer in 2015, which grew to over 100 billion yuan (~$14B) in assets by 2021. Through High-Flyer, built massive computing infrastructure that became the foundation for DeepSeek, launched in May 2023 with the goal of pursuing AGI. DeepSeek's R1 reasoning model (January 2025) shocked the world -- trained for ~$6M vs GPT-4's ~$100M, it matched frontier model performance and caused a brief $1 trillion market cap loss across US tech stocks. DeepSeek demonstrated that Chinese AI could compete at the frontier with a fraction of the resources.",
    papers:[{y:"2024",t:"DeepSeek-V2: A Strong, Economical, and Efficient Mixture-of-Experts Language Model [500+]",url:"https://arxiv.org/abs/2405.04434"},{y:"2025",t:"DeepSeek-R1: Incentivizing Reasoning Capability in LLMs via Reinforcement Learning [1K]",url:"https://arxiv.org/abs/2501.12948"}]},
  { id:"kaifulee", name:"Kai-Fu Lee", org:"01.AI / Sinovation", title:"Founder of 01.AI · Former Google China President", field:["nlp"],
    bio:"Born 1961 in Taipei, Taiwan. Grew up in Tennessee, USA. Earned a BS in Computer Science from Columbia University (1983), then a PhD from Carnegie Mellon University (1988), where his thesis on speaker-independent continuous speech recognition using Hidden Markov Models was named the 'Most Important Innovation' by BusinessWeek. Career at the intersection of industry and China: Apple (1990-1996, led speech recognition), SGI VP, Microsoft VP (founded Microsoft Research China in Beijing, 1998). Became President of Google China (2005-2009), overseeing Google's expansion in China. Founded Sinovation Ventures (2009), one of China's top AI-focused VC firms. In 2023, founded 01.AI to build open-source large language models, quickly reaching unicorn status. Author of 'AI Superpowers: China, Silicon Valley, and the New World Order' (2018), one of the most influential books on AI geopolitics.",
    papers:[]},
  { id:"jietang", name:"Jie Tang", org:"Zhipu AI / Tsinghua", title:"Founder of Zhipu AI · Tsinghua Professor", field:["nlp"],
    bio:"Professor at the Department of Computer Science at Tsinghua University. Founded and led the AMiner academic search system. Tasked by the Beijing Academy of Artificial Intelligence (BAAI) to build China's first super-scale natural language model, completed in 2021. Founded Zhipu AI to commercialize this work, creating the GLM (General Language Model) series that has become one of China's leading foundation models. Zhipu AI is now valued at over $3B and is considered one of the 'Big Four' Chinese AI foundation model companies alongside Baidu, Alibaba, and ByteDance's AI labs.",
    papers:[{y:"2022",t:"GLM: General Language Model Pretraining [1K]",url:"https://arxiv.org/abs/2210.02414"},{y:"2024",t:"ChatGLM: A Family of Large Language Models from GLM-130B [500+]",url:"https://arxiv.org/abs/2406.12793"}]},

  // ===== MiniMax =====
  { id:"yanjunjie", name:"Yan Junjie", org:"MiniMax", title:"Founder & CEO of MiniMax", field:["nlp","vision"],
    bio:"Born ~1989. Taught himself advanced calculus in high school after finding the standard curriculum too slow. Earned a degree in Mathematics from Southeast University (2006), then a PhD from the Institute of Automation, Chinese Academy of Sciences (2015). Conducted postdoctoral research at Tsinghua University. Spent 6+ years at SenseTime, rising to deputy head of its research institute. Became captivated by OpenAI after its bots defeated elite human teams in Dota 2 (2019), prompting a career pivot from computer vision to NLP. Founded MiniMax in December 2021. The company developed Hailuo AI (video generation) and a suite of multimodal models. MiniMax IPO'd on the Hong Kong Stock Exchange in January 2026, making Yan a billionaire at age 36 with a net worth of $3.2B.",
    papers:[]},

  // ===== StepFun / 阶跃星辰 =====
  { id:"jiangdaxin", name:"Jiang Daxin", org:"StepFun", title:"Founder & CEO of StepFun · 前微软全球副总裁",field:["nlp","vision"],
    bio:"中科大本科,中科院软件所硕士,纽约州立布法罗 CS PhD(2005)。新加坡南洋理工助教 1 年。2007 加入微软亚洲研究院首席研究员,16 年微软生涯横跨 ML/数据挖掘/NLP/生物信息学。2008 SIGKDD 最佳应用论文奖。2011 转微软亚洲互联网工程院(STCA)。2017 升微软全球合伙人 + STCA 副院长 + 首席科学家。2023.3 升微软副总裁,负责 Bing 全球搜索 + AI School China + NLP 技术研发,管 400+ 人精英团队。2023.4 创办阶跃星辰主攻多模态 + AGI Scaling Law。2025 入选 IEEE Fellow。Step 系列模型(Step-1/Step-2/Step-3)以多模态生成著称。「AI 六小虎」之一,与上海资本系深度绑定。",
    papers:[{y:"2008",t:"SIGKDD Best Applied Research Paper Award"},{y:"2024",t:"Step-1V Multimodal Foundation Model"},{y:"2025",t:"IEEE Fellow"}]},

  // ===== Moonshot AI / Kimi =====
  { id:"yangzhilin", name:"Yang Zhilin", org:"Moonshot AI", title:"Founder & CEO of Moonshot AI (Kimi)", field:["nlp"],
    bio:"Born 1992 in Shantou, Guangdong. Attended Shantou Jinshan Middle School. With no prior programming background, was selected for the informatics Olympiad training program and won first prize in the Guangdong division of the National Olympiad in Informatics, earning guaranteed admission to Tsinghua University. Initially admitted to Thermal Energy Engineering, transferred to Computer Science in his sophomore year and studied under Professor Jie Tang. Graduated top of his class with a BSc (2015). Earned a PhD from Carnegie Mellon University in just 4 years (standard is 6), completed 2019, under Ruslan Salakhutdinov (later Apple's head of AI) and William Cohen (Google DeepMind). During his PhD, interned at Meta and Google Brain. Co-developed Transformer-XL and XLNet, extending Transformers to handle much longer sequences. Founded Moonshot AI in March 2023 with Tsinghua classmates Zhou Xinyu and Wu Yuxin. Created Kimi, one of China's most popular AI assistants, known for its industry-leading long-context capability (200K+ tokens from the start). Also an assistant professor at Tsinghua and PI at Shanghai Qizhi Research Institute.",
    papers:[{y:"2019",t:"Transformer-XL: Attentive Language Models Beyond a Fixed-Length Context [3K]",url:"https://arxiv.org/abs/1901.02860"},{y:"2019",t:"XLNet: Generalized Autoregressive Pretraining for Language Understanding [7K]",url:"https://arxiv.org/abs/1906.08237"}]},

  // ===== ByteDance / Doubao =====
  { id:"wuyonghui", name:"Wu Yonghui", org:"ByteDance Seed", title:"Head of ByteDance AI Research · Former Google Fellow", field:["nlp","deep-learning"],
    bio:"Graduated from Nanjing University, then earned a Master's in Statistics and PhD in Computer Science from the University of California, Riverside (2008). Joined Google in 2008, spending his first 7 years as a software engineer on core search ranking. From 2014-2023 at Google Brain, working on machine learning, genomics, and NLP. Promoted to Google Fellow in September 2023 -- a senior-level position equivalent to VP. Best known as the first author of Google's Neural Machine Translation System (GNMT, 2016), which transformed Google Translate from phrase-based to neural. Joined ByteDance in February 2025 as head of foundational research for the Seed team (Doubao large model), reporting directly to CEO Liang Rubo. Also created Seedance 2.0, ByteDance's breakthrough video generation model.",
    papers:[{y:"2016",t:"Google's Neural Machine Translation System: Bridging the Gap Between Human and Machine Translation [7K]",url:"https://arxiv.org/abs/1609.08144"}]},

  // ===== Tencent =====
  { id:"zhangzhengyou", name:"Zhang Zhengyou", org:"Tencent", title:"Tencent Chief Scientist · Inventor of Zhang's Method", field:["vision"],
    bio:"Born 1965 in Hubei, China. BS from Huazhong University of Science and Technology, MS from University of Nancy (France), PhD in Computer Science from University of Paris XI (1990) under Olivier Faugeras. Joined Microsoft Research in 1998, becoming a Principal Researcher. Invented the Zhang camera calibration method (1998) -- universally known as 'Zhang's Method', used in virtually every computer vision application worldwide from autonomous vehicles to AR. Elected IEEE Fellow and ACM Fellow. Joined Tencent in 2018 as Chief Scientist, heading both the Robotics X Lab and the Futian Lab. Leads Tencent's research in computer vision, robotics, and embodied AI.",
    papers:[{y:"1998",t:"A Flexible New Technique for Camera Calibration (Zhang's Method) [15K]",url:"https://ieeexplore.ieee.org/document/888718"},{y:"2000",t:"Determining the Epipolar Geometry and its Uncertainty"}]},
  { id:"yudong", name:"Yu Dong", org:"Tencent", title:"Former Tencent AI Lab VP · Speech AI Pioneer", field:["nlp","deep-learning"],
    bio:"Zhejiang University Electrical Engineering BS, Chinese Academy of Sciences Institute of Automation MS (Pattern Recognition), Indiana University Bloomington CS MS, University of Idaho CS PhD. Pioneered applying deep learning to speech recognition at Microsoft Research, where he worked for 16+ years and became a Principal Researcher. His work on DNN-based speech recognition (2011, with Hinton, Deng Li et al.) was a landmark result that started the deep learning revolution in speech. Joined Tencent AI Lab as VP in 2017. Led research in speech processing, multimodal interaction, and LLM-based NLP. Co-authored 200+ papers and several books on speech recognition. Left Tencent at end of January 2026.",
    papers:[{y:"2011",t:"Context-Dependent Pre-Trained Deep Neural Networks for Large-Vocabulary Speech Recognition [6K]",url:"https://ieeexplore.ieee.org/document/5947401"},{y:"2014",t:"Automatic Speech Recognition: A Deep Learning Approach (book)"}]},
  { id:"yaoshunyu", name:"Yao Shunyu", org:"Tencent", title:"Tencent Chief AI Scientist · ReAct + ToT 提出者", field:["nlp","rl"],
    bio:"1998 年生,安徽理科探花。2015 入清华姚班 (Yao Class)。2019 赴 Princeton 读 CS PhD,导师 Karthik Narasimhan(NLP+RL 方向);2024.6 博士毕业。在校期间已是 Agent 范式奠基人:提出 ReAct (推理-行动融合,2022)、Tree of Thoughts (ToT 思维树,2023)、CoALA 模块化认知架构。2024.8 加入 OpenAI 研究团队,主导 Operator (浏览器 agent) + Deep Research 产品。2025.12 加入腾讯任首席 AI 科学家,27 岁直接汇报总裁刘炽平,主导混元大模型与智能体技术融合。因姓名「姚顺雨」谐音「尧舜禹」被业内戏称腾讯尧舜禹。除学术外是地下 rapper,有作品在网易云音乐发表。",
    papers:[{y:"2022",t:"ReAct: Synergizing Reasoning and Acting in Language Models [3K]",url:"https://arxiv.org/abs/2210.03629"},{y:"2023",t:"Tree of Thoughts: Deliberate Problem Solving with LLMs [5K]",url:"https://arxiv.org/abs/2305.10601"},{y:"2024",t:"CoALA: Cognitive Architectures for Language Agents",url:"https://arxiv.org/abs/2309.02427"}]},

  // ===== Alibaba / Qwen =====
  { id:"zhoujingren", name:"Zhou Jingren", org:"Alibaba Cloud", title:"CTO of Alibaba Cloud · Head of Tongyi Lab", field:["nlp","deep-learning"],
    bio:"PhD in Computer Science from Columbia University. Previously worked at Microsoft Research. Joined Alibaba in 2015, serving as Chief Scientist at Alibaba Cloud and Deputy Director of DAMO Academy. Now CTO of Alibaba Cloud and head of Tongyi Lab, overseeing the Qwen (Tongyi Qianwen) model family -- China's most influential open-source LLM series. After the departure of tech lead Lin Junyang in March 2026, took direct supervision of the Qwen team. Co-leads Alibaba's Foundation Model Task Force alongside CEO Eddie Wu.",
    papers:[{y:"2023",t:"Qwen Technical Report [500+]",url:"https://arxiv.org/abs/2309.16609"},{y:"2024",t:"Qwen2 Technical Report [500+]",url:"https://arxiv.org/abs/2407.10671"}]},
  { id:"linjunyang", name:"Lin Junyang", org:"Independent", title:"Former Qwen Tech Lead · Youngest P10 at Alibaba", field:["nlp"],
    bio:"Born 1993. Studied computer science and linguistics at Peking University, earning a Master's degree in linguistics. Joined Alibaba's DAMO Academy in 2019 as a Senior Algorithm Engineer working on NLP and multimodal research. Played central roles in Alibaba's M6 (extreme-scale MoE model), OFA (ICML 2022), and Chinese-CLIP. His defining achievement was turning Qwen from an unknown side project into the world's most influential open-source LLM series. Became the youngest P10-level tech lead at Alibaba (2025) -- an extraordinarily senior technical position. Resigned in March 2026 over disagreements with organizational restructuring that would fragment the vertically integrated Qwen team structure he had built.",
    papers:[{y:"2022",t:"OFA: Unifying Architectures, Tasks, and Modalities Through a Simple Sequence-to-Sequence Learning Framework [1K]",url:"https://arxiv.org/abs/2202.03052"},{y:"2023",t:"Qwen Technical Report [500+]",url:"https://arxiv.org/abs/2309.16609"},{y:"2025",t:"Qwen2.5 Technical Report [200+ citations]",url:"https://arxiv.org/abs/2412.15115"}]},

  // ===== RL / LSTM Pioneers =====
  { id:"sutton", name:"Richard Sutton", org:"University of Alberta", title:"Father of Reinforcement Learning", field:["rl"],
    bio:"Born 1956 in the USA. Earned a BA in Psychology from Stanford (1978), then a PhD in Computer Science from the University of Massachusetts Amherst (1984) under Andrew Barto -- together they founded the field of reinforcement learning. Joined the University of Alberta (2003) where he became a Distinguished Research Professor and iCORE Chair. Co-authored 'Reinforcement Learning: An Introduction' (1998, 2nd ed. 2018) with Barto -- THE standard textbook that trained virtually every RL researcher alive. Invented temporal-difference (TD) learning, policy gradient methods, and the Dyna architecture. Served as Distinguished Research Scientist at DeepMind Alberta. His 2019 essay 'The Bitter Lesson' -- arguing that general methods leveraging computation always win over hand-crafted approaches -- became one of the most cited philosophical pieces in modern AI.",
    papers:[{y:"1998",t:"Reinforcement Learning: An Introduction (textbook) [75K]",url:"http://incompleteideas.net/book/the-book.html"},{y:"1988",t:"Learning to Predict by the Methods of Temporal Differences [6K]",url:"https://link.springer.com/article/10.1007/BF00115009"},{y:"2019",t:"The Bitter Lesson [3K]",url:"http://www.incompleteideas.net/IncIdeas/BitterLesson.html"}]},
  { id:"schmidhuber", name:"Juergen Schmidhuber", org:"KAUST / IDSIA", title:"Co-inventor of LSTM · AI Pioneer", field:["deep-learning","rl"],
    bio:"Born 1963 in Munich, Germany. Earned his PhD from the Technical University of Munich (1991). Co-director of the Swiss AI Lab IDSIA in Lugano. Co-invented Long Short-Term Memory (LSTM) networks with Sepp Hochreiter (1997) -- the architecture that powered Google Translate, Siri, Alexa, and most sequence modeling before Transformers. Also pioneered work on meta-learning, neural network compression, and formal theories of curiosity-driven learning. Founded NNAISENSE (2014) for industrial AI. Moved to KAUST in Saudi Arabia (2021) to lead the AI Initiative. Known for being vocal about credit attribution in deep learning history, frequently reminding the community of pre-2012 contributions.",
    papers:[{y:"1997",t:"Long Short-Term Memory (LSTM) [35K citations]",url:"https://www.bioinf.jku.at/publications/older/2604.pdf"},{y:"2015",t:"Deep Learning in Neural Networks: An Overview [17K citations]",url:"https://arxiv.org/abs/1404.7828"}]},
  { id:"hochreiter", name:"Sepp Hochreiter", org:"JKU Linz / ELLIS", title:"Co-inventor of LSTM", field:["deep-learning"],
    bio:"Austrian computer scientist. Studied computer science at the Technical University of Munich, completing his diploma thesis under Juergen Schmidhuber in 1991 -- in which he first identified the vanishing gradient problem in recurrent neural networks. This led to the invention of LSTM (1997, with Schmidhuber), which solved the problem and became the dominant architecture for sequence modeling for two decades. Professor at Johannes Kepler University Linz (Austria). Founded the ELLIS Unit Linz and the Institute for Machine Learning at JKU. Also contributed to bioinformatics with DeepTox.",
    papers:[{y:"1997",t:"Long Short-Term Memory (LSTM) [35K]",url:"https://www.bioinf.jku.at/publications/older/2604.pdf"},{y:"1991",t:"Untersuchungen zu dynamischen neuronalen Netzen (vanishing gradient problem)"}]},

  // ===== Key Missing Global Figures =====
  { id:"kingma", name:"Diederik Kingma", org:"Anthropic", title:"Creator of VAE and Adam Optimizer", field:["deep-learning"],
    bio:"Dutch computer scientist. PhD cum laude from the University of Amsterdam (2017) under Max Welling. Created two of the most fundamental building blocks of modern AI: the Variational Autoencoder (VAE, 2013) -- bridging probabilistic modeling and deep learning, enabling generative models to learn latent structure -- and the Adam optimizer (2014, with Jimmy Ba) -- the most widely used optimization algorithm in deep learning with 95,000+ citations. Part of the founding team of OpenAI (2015). Worked at Google Brain on large-scale optimization and generative models. Joined Anthropic in October 2024. Won the ICLR Test of Time Award in 2024 (VAE) and 2025 (Adam) -- two consecutive years.",
    papers:[{y:"2013",t:"Auto-Encoding Variational Bayes (VAE) [28K]",url:"https://arxiv.org/abs/1312.6114"},{y:"2014",t:"Adam: A Method for Stochastic Optimization [136K]",url:"https://arxiv.org/abs/1412.6980"}]},
  { id:"vinyals", name:"Oriol Vinyals", org:"Google DeepMind", title:"VP of Research · Seq2Seq Co-creator", field:["nlp","rl"],
    bio:"Born in Chile, raised in Catalonia, Spain. Earned a BS from UC Berkeley, MS from UC San Diego, and PhD from UC Berkeley (2016) under Nelson Morgan. Joined Google Brain and later DeepMind. Co-invented the sequence-to-sequence model (2014, with Sutskever and Quoc Le) -- one of the foundational architectures leading to modern LLMs. Led AlphaStar (2019), the AI that defeated top StarCraft II players. Now VP of Research at Google DeepMind, co-leading Gemini development. One of the most prolific researchers in modern AI with contributions spanning NLP, computer vision, and game AI.",
    papers:[{y:"2014",t:"Sequence to Sequence Learning with Neural Networks [21K]",url:"https://arxiv.org/abs/1409.3215"},{y:"2019",t:"Grandmaster level in StarCraft II using multi-agent RL (AlphaStar) [3K]",url:"https://www.nature.com/articles/s41586-019-1724-z"},{y:"2015",t:"Show and Tell: A Neural Image Caption Generator [10K citations]",url:"https://arxiv.org/abs/1411.4555"}]},
  { id:"rombach", name:"Robin Rombach", org:"Black Forest Labs", title:"Creator of Stable Diffusion / Latent Diffusion", field:["vision"],
    bio:"German AI researcher. Studied physics at Heidelberg University before transitioning to computer science. PhD at LMU Munich under Bjorn Ommer. Co-authored the Latent Diffusion paper (2022) which introduced the breakthrough idea of running diffusion in compressed latent space rather than pixel space -- reducing compute cost by 10-100x while maintaining quality. This became Stable Diffusion, the most widely used open-source image generation model. Joined Stability AI as research director. In 2024, left to co-found Black Forest Labs with the original latent diffusion team (Blattmann, Esser, Lorenz), creating the FLUX family of models that quickly became industry-leading image generators.",
    papers:[{y:"2022",t:"High-Resolution Image Synthesis with Latent Diffusion Models (Stable Diffusion) [11K]",url:"https://arxiv.org/abs/2112.10752"}]},
  { id:"mensch", name:"Arthur Mensch", org:"Mistral AI", title:"Co-founder & CEO of Mistral AI", field:["nlp"],
    bio:"Born 1992 in Paris. Father a mathematician, mother a computer scientist. Studied at Lycee Hoche (prep school), then Ecole Polytechnique (MS Applied Mathematics and Computer Science, 2011-2015), and Ecole Normale Superieure Paris-Saclay (MS Mathematics, Vision and Learning, 2015). PhD in machine learning and functional MRI, followed by a 2-year postdoc in mathematics. Joined DeepMind Paris in late 2020, working on large language models, multimodal systems, and retrieval-augmented architectures. Left in May 2023 to co-found Mistral AI with Guillaume Lample and Timothee Lacroix (both ex-Meta FAIR). Mistral became Europe's AI champion, reaching a multi-billion dollar valuation within a year. Known for open-weight models (Mixtral, Mistral Large) and strategic partnerships with Microsoft, Salesforce, and Nvidia.",
    papers:[{y:"2024",t:"Mixtral of Experts [2K]",url:"https://arxiv.org/abs/2401.04088"}]},

  // ===== Chinese Industry Leaders =====
  { id:"robinli", name:"Robin Li", org:"Baidu", title:"Founder & CEO of Baidu · ERNIE", field:["nlp"],
    bio:"Born 1968 as Li Yanhong in Yangquan, Shanxi Province, China. Studied Information Management at Peking University, then earned an MS in Computer Science from the University at Buffalo, New York. While in the US, created RankDex (1996), an early search engine that used hyperlink analysis for page ranking -- predating Google's PageRank. Founded Baidu in 2000 with Eric Xu, growing it into China's dominant search engine. Has been CEO since 2004. Pivoted Baidu heavily toward AI: developed autonomous driving platform Apollo Go (20M+ rides by 2025), launched ERNIE (Wenxin) large language model series, and ERNIE Bot which reached 202M monthly active users by December 2025. Named to TIME 100 AI (2023). One of the earliest advocates for AI in China, betting on AI for over a decade before it became mainstream.",
    papers:[]},
  { id:"luqi", name:"Lu Qi", org:"MiraclePlus", title:"Founder of MiraclePlus · Former Baidu COO & Microsoft EVP", field:["nlp"],
    bio:"Born 1961. Earned a PhD in Computer Science from Carnegie Mellon University. One of the most accomplished Chinese tech executives in Silicon Valley. Career: IBM Research, Yahoo (VP of Engineering), Microsoft (Executive Vice President of Applications and Services, 2013-2016, one of the highest-ranking Chinese executives in US tech). Recruited by Robin Li to serve as Baidu COO and Group President (2017-2018), where he accelerated Baidu's AI transformation. Personally recruited by Sam Altman to lead Y Combinator's China office (2018-2019). Founded MiraclePlus (formerly YC China, then renamed) in Beijing, a startup accelerator that has backed 340+ companies including many AI firms. Known as a bridge between Silicon Valley and Chinese tech ecosystems.",
    papers:[]},
  {id:"yaoqizhi",name:"Andrew Yao",org:"Tsinghua IIIS",title:"Turing Award 2000 · Yao Class Founder",field:["deep-learning","safety"],bio:"Born 1946 Shanghai. NTU Physics, Harvard PhD CS 1972. Turing Award 2000. Left Princeton for Tsinghua 2004. Founded Yao Class 2005 and IIIS. Alumni: Yang Zhilin, Chen Jianyu, Chen Danqi, Ma Tengyu. Most important CS educator in China.",papers:[{y:"2000",t:"Turing Award"},{y:"2005",t:"Founded Yao Class"}]},
  {id:"tangxiaoou",name:"Tang Xiaoou",org:"SenseTime / CUHK",title:"SenseTime Founder · Vision Godfather (1968-2023)",field:["vision","deep-learning"],bio:"Born 1968. USTC BS, MIT PhD. Founded MMLab at CUHK 2001. Students: He Kaiming, Lin Dahua, Wang Xiaogang. Co-founded SenseTime 2014 ($12B+). Passed away Dec 2023.",papers:[{y:"2001",t:"Founded CUHK MMLab"},{y:"2014",t:"Co-founded SenseTime"}]},
  {id:"zhusongchun",name:"Zhu Songchun",org:"PKU / BIGAI",title:"3x Marr Prize · AGI Pioneer",field:["vision","rl"],bio:"Born 1968. USTC, Harvard PhD 1996. UCLA Prof. 3x Marr Prize, 2x CVPR chair. Returned China 2020. Built Tong Tong AGI prototype. Published AGI standards 2025.",papers:[{y:"2024",t:"Tong Tong AGI"},{y:"2025",t:"AGI Standards"}]},
  {id:"lindahua",name:"Lin Dahua",org:"SenseTime / CUHK",title:"OpenMMLab Founder",field:["vision"],bio:"USTC, MIT PhD. NIPS 2010 Best Student Paper. Founded OpenMMLab 2018 (20K+ stars). SenseTime co-founder.",papers:[{y:"2018",t:"OpenMMLab 20K+ stars"}]},
  {id:"wangxiaogang",name:"Wang Xiaogang",org:"SenseTime",title:"SenseTime Co-founder",field:["vision"],bio:"CUHK MMLab under Tang Xiaoou. SenseTime co-founder + Research Director.",papers:[{y:"2014",t:"SenseTime co-founder"}]},
  {id:"chendanqi",name:"Chen Danqi",org:"Princeton",title:"Yao Class 2008 · NLP",field:["nlp"],bio:"Yao Class 2008. Stanford PhD 2018. Princeton professor. Sloan 2022.",papers:[{y:"2022",t:"Sloan Award"}]},
  {id:"matengyu",name:"Ma Tengyu",org:"Stanford",title:"Yao Class 2008 · ML Theory",field:["deep-learning"],bio:"Yao Class 2008. Princeton PhD 2017. Stanford professor. Sloan 2021.",papers:[{y:"2021",t:"Sloan Award"}]},
  {id:"huangminlie",name:"Huang Minlie",org:"Tsinghua CoAI",title:"Dialogue AI Pioneer",field:["nlp"],bio:"Tsinghua professor, CoAI group. DeepSeek members from his lab. Pioneered Chinese dialogue systems.",papers:[]},
  {id:"luofuli",name:"Luo Fuli",org:"Xiaomi (ex-DeepSeek)",title:"Ex-DeepSeek · Poached by Lei Jun",field:["nlp"],bio:"PKU linguistics MS. DAMO Academy. DeepSeek core 2022. Poached by Lei Jun 2025 with 10M+ package.",papers:[{y:"2025",t:"Poached by Xiaomi"}]},
  {id:"wangbingxuan",name:"Wang Bingxuan",org:"Tencent (ex-DeepSeek)",title:"DeepSeek V1 Core → Tencent",field:["nlp"],bio:"DeepSeek first-gen LLM core author. Left for Tencent 2025. Part of 5+ core exodus. 2-3x salary offers.",papers:[{y:"2025",t:"Left for Tencent"}]},
  {id:"pachocki",name:"Jakub Pachocki",org:"OpenAI",title:"Chief Scientist (post-Sutskever)",field:["deep-learning","rl"],bio:"Polish-born. MIT PhD in theoretical CS. Joined OpenAI 2017 as research scientist. Led alignment and reasoning research. Became Head of Alignment, then promoted to Chief Scientist in mid-2024 after Ilya Sutskever's departure. Key architect behind o1 and o3 reasoning models. Works alongside Mark Chen as co-leader of OpenAI research.",papers:[{y:"2024",t:"OpenAI Chief Scientist",url:"https://openai.com/index/jakub-pachocki/"},{y:"2024",t:"o1 reasoning model"},{y:"2025",t:"o3 reasoning model"}]},

// ===================================================================
// D3 GRAPH
// ===================================================================
const W = window.innerWidth;
const H = window.innerHeight - 48;

const svg = d3.select("#main-svg");
const g = svg.append("g");

// Zoom
const zoomBehavior = d3.zoom().scaleExtent([0.15, 5])
  .on("zoom", ({transform}) => g.attr("transform", transform));
svg.call(zoomBehavior);

// 节点光晕:放弃 feGaussianBlur,用纯渐变填充(滤镜在 zoom/pan 时极慢)
const defs = svg.append("defs");
const glowGrad = defs.append("radialGradient").attr("id","glow-grad").attr("cx","50%").attr("cy","50%").attr("r","50%");
glowGrad.append("stop").attr("offset","0%").attr("stop-color","white").attr("stop-opacity",0.55);
glowGrad.append("stop").attr("offset","60%").attr("stop-color","white").attr("stop-opacity",0.18);
glowGrad.append("stop").attr("offset","100%").attr("stop-color","white").attr("stop-opacity",0);

// Force simulation
const simulation = d3.forceSimulation(scholars)
  .force("link", d3.forceLink(connections).id(d=>d.id).distance(d=>{
    if(d.type==="cofounder")return 70;if(d.type==="coauthor")return 95;if(d.type==="advisor")return 110;return 140;
  }).strength(d=>{
    if(d.type==="cofounder")return 0.8;if(d.type==="coauthor")return 0.4;if(d.type==="advisor")return 0.5;return 0.12;
  }))
  .force("charge", d3.forceManyBody().strength(-260).distanceMax(600))
  .force("center", d3.forceCenter(W/2, H/2))
  .force("collision", d3.forceCollide().radius(36))
  .force("x", d3.forceX(W/2).strength(0.04))
  .force("y", d3.forceY(H/2).strength(0.04))
  .alphaDecay(0.05)
  .velocityDecay(0.55)
  .alphaMin(0.01);

setTimeout(()=>{ if(simulation.alpha() < 0.05) simulation.stop(); }, 8000);

// Links — use <path> for curved lines
const linkG = g.append("g");
const linkLines = linkG.selectAll("path").data(connections).join("path")
  .attr("class", d => `link-line type-${d.type}`)
  .attr("fill", "none");

// Nodes
const nodeG = g.append("g");
const nodeGroups = nodeG.selectAll("g").data(scholars).join("g")
  .attr("class","node-group")
  .call(d3.drag().on("start",(e,d)=>{if(!e.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
    .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on("end",(e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;}));

function nodeSize(d){
  const c=connections.filter(c=>{
    const s=typeof c.source==='object'?c.source.id:c.source;
    const t=typeof c.target==='object'?c.target.id:c.target;
    return s===d.id||t===d.id;
  }).length;
  return Math.min(Math.max(c*1.3+4,5),16);
}

// Glow — 移除 SVG filter,改用纯填充,GPU 友好
nodeGroups.append("circle").attr("class","node-glow")
  .attr("r",d=>nodeSize(d)+6)
  .attr("fill",d=>getColor(d.org))
  .attr("opacity",0.22);

// Circle
nodeGroups.append("circle").attr("class","node-circle")
  .attr("r",d=>nodeSize(d))
  .attr("fill",d=>getColor(d.org))
  .attr("stroke","rgba(255,255,255,0.08)")
  .attr("stroke-width",0.5)
  .style("cursor","pointer");

// Labels — name + org
nodeGroups.append("text").attr("class","node-label node-name-label")
  .attr("dy",d=>nodeSize(d)+13)
  .attr("font-size","10px")
  .attr("letter-spacing","-0.08px")
  .text(d=>d.name);
nodeGroups.append("text").attr("class","node-label node-org-label")
  .attr("dy",d=>nodeSize(d)+23)
  .attr("font-size","8px")
  .attr("letter-spacing","-0.06px")
  .attr("fill","rgba(255,255,255,0.35)")
  .text(d=>d.org);

// Tick — straight lines
simulation.on("tick",()=>{
  linkLines.attr("d", d => `M${d.source.x},${d.source.y} L${d.target.x},${d.target.y}`);
  nodeGroups.attr("transform",d=>`translate(${d.x},${d.y})`);
});

// ===================================================================
// INTERACTIONS
// ===================================================================
const tooltip = document.getElementById("tooltip");

// Hover highlight
nodeGroups.on("mouseenter",(event,d)=>{
  const connected = new Set([d.id]);
  connections.forEach(c=>{
    const s=typeof c.source==='object'?c.source.id:c.source;
    const t=typeof c.target==='object'?c.target.id:c.target;
    if(s===d.id)connected.add(t);if(t===d.id)connected.add(s);
  });
  nodeGroups.classed("dimmed",n=>!connected.has(n.id)).classed("highlighted",n=>connected.has(n.id));
  linkLines.classed("dimmed",l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return s!==d.id&&t!==d.id;
  }).classed("highlighted",l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return s===d.id||t===d.id;
  });
  // Tooltip
  const zhTip = scholarZh[d.id];
  document.getElementById("tooltip-name").textContent = (currentLang === "zh" && zhTip && zhTip.zhName) ? zhTip.zhName + "  " + d.name : d.name;
  document.getElementById("tooltip-org").textContent=d.org;
  tooltip.classList.add("visible");
}).on("mousemove",(event)=>{
  tooltip.style.left=(event.clientX+14)+"px";
  tooltip.style.top=(event.clientY-10)+"px";
}).on("mouseleave",()=>{
  nodeGroups.classed("dimmed",false).classed("highlighted",false);
  linkLines.classed("dimmed",false).classed("highlighted",false);
  tooltip.classList.remove("visible");
});

// Click → Detail Panel (openDetail defined later in i18n section)
nodeGroups.on("click",(event,d)=>{
  event.stopPropagation();
  history.replaceState(null,'',`?node=${encodeURIComponent(d.id)}`);
  openDetail(d);
});
svg.on("click",()=>closeDetail());

function closeDetail(){
  document.getElementById("detail-panel").classList.remove("open");
  if(location.search) history.replaceState(null,'',location.pathname);
}

// Deep link: focus node from ?node=X URL param on load
(function(){
  const id=new URLSearchParams(location.search).get('node');
  if(!id) return;
  const target=scholars.find(s=>s.id===id);
  if(!target) return;
  setTimeout(()=>openDetail(target),700);
})();
document.getElementById("detail-close").addEventListener("click",e=>{e.stopPropagation();closeDetail();});

document.getElementById("search-input").addEventListener("input",e=>{
  const q=e.target.value.toLowerCase().trim();
  if(!q){
    nodeGroups.style("opacity",null);linkLines.style("opacity",null);return;
  }
  const match=new Set();
  scholars.forEach(s=>{
    const zh = (typeof scholarZh !== 'undefined' && scholarZh[s.id]) || {};
    const haystack = [
      s.name, s.org, s.title, s.bio, s.id,
      zh.zhName, zh.title, zh.bio,
      orgAlias[s.org] || '',
      ...((s.papers||[]).map(p => p.t || ''))
    ].filter(Boolean).join(' \n ').toLowerCase();
    if(haystack.includes(q)) match.add(s.id);
  });
  const expanded=new Set(match);
  connections.forEach(c=>{
    const s=typeof c.source==='object'?c.source.id:c.source;
    const t=typeof c.target==='object'?c.target.id:c.target;
    if(match.has(s))expanded.add(t);if(match.has(t))expanded.add(s);
  });
  nodeGroups.style("opacity",d=>match.has(d.id)?1:expanded.has(d.id)?0.4:0.04);
  linkLines.style("opacity",l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return(match.has(s)||match.has(t))?0.5:0.02;
  });
});

document.querySelectorAll(".filter-pill").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".filter-pill").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const f=btn.dataset.filter;
    if(f==="all"){nodeGroups.style("opacity",null);linkLines.style("opacity",null);return;}
    const match=new Set();
    scholars.forEach(s=>{if(s.field&&s.field.includes(f))match.add(s.id);});
    nodeGroups.style("opacity",d=>match.has(d.id)?1:0.04);
    linkLines.style("opacity",l=>{
      const s=typeof l.source==='object'?l.source.id:l.source;
      const t=typeof l.target==='object'?l.target.id:l.target;
      return(match.has(s)&&match.has(t))?0.5:0.02;
    });
  });
});
